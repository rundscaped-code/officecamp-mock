<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024">
<title>オフィスキャンプ（PC）</title>
<style>
  :root{
    --bg:#F6F7F9;--panel:#FFFFFF;--side:#0E1116;--side-ink:#C7CCD4;
    --ink:#1A1D21;--sub:#5F6670;--line:#E7E9ED;--accent:#2D6CDF;--accent-soft:#EAF1FD;
    --good:#2E7D52;--bad:#C0392B;--warn:#B8860B;--radius:12px;--side-active:#1C2230;
    --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
    /* タイポグラフィトークン（L-3）: 主要コンポーネントの文字サイズはこの4段で指定する */
    --fs-xs:11px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;
  }
  [data-theme="dark"]{
    --bg:#0F1115;--panel:#171A1F;--side:#0A0C10;--side-ink:#AEB6C2;--side-active:#1E2530;
    --ink:#E8EAED;--sub:#8A929E;--line:#262A31;--accent:#5B8DEF;--accent-soft:#1A2433;
    --good:#4FAF7C;--bad:#E5705F;--warn:#D4A24B;--shadow:0 1px 3px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",Segoe UI,sans-serif;font-size:var(--fs-md)}
  .hidden{display:none!important}
  button{font-family:inherit}
  /* ===== シェル ===== */
  .app{display:flex;height:100dvh}
  .side{width:236px;flex:none;background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;padding:18px 12px}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 10px 18px;font-weight:800;letter-spacing:.5px;color:#fff;font-size:15px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1}
  /* ナビはbutton要素（Tab移動・Enter起動を成立させる、M-4）。a向けの旧指定も互換のため残す */
  .nav a,.nav button{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-weight:600;font-size:13.5px;user-select:none;
    border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
  .nav a:hover,.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.on,.nav button.on{background:var(--side-active);color:#fff}
  .nav a .ic,.nav button .ic{width:18px;height:18px;flex:none;opacity:.9}
  .nav .navsec{font-size:10px;letter-spacing:1.5px;color:#5b626d;font-weight:700;padding:14px 12px 6px}
  .side-foot{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:8px;display:flex;flex-direction:column;gap:2px}
  .side-foot .me{padding:6px 12px;font-size:12px;color:#8b929d}
  .side-foot .me b{color:#fff;display:block;font-size:13px}
  .sfbtn{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-size:13px;
    border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
  .sfbtn:hover{background:rgba(255,255,255,.06);color:#fff}
  /* キーボード操作の可視化（M-4）: Tab移動時のみアウトラインを出す */
  :where(a,button,select,input,textarea,summary,[tabindex]):focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* ===== メイン ===== */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{height:62px;flex:none;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:16px;padding:0 26px}
  .top h1{margin:0;font-size:18px;font-weight:800}
  .top .spacer{flex:1}
  .content{flex:1;overflow:auto;padding:24px 26px}
  .maxw{max-width:1280px;margin:0 auto}
  /* ===== 部品 ===== */
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;transition:filter .12s}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--accent-soft);filter:none}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .input,select.input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:var(--fs-md);color:var(--ink);outline:none;font-family:inherit}
  .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  select.input{appearance:none}
  label.fl{display:block;font-size:var(--fs-sm);font-weight:700;color:var(--sub);margin:0 2px 5px}
  .field{margin-bottom:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:800;font-size:var(--fs-md);display:flex;align-items:center;gap:8px}
  .card-b{padding:16px}
  .muted{color:var(--sub)}
  .empty{color:var(--sub);text-align:center;padding:34px 10px;font-size:13.5px}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
  .kpi .l{font-size:var(--fs-sm);color:var(--sub);font-weight:700}
  .kpi .n{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .kpi .s{font-size:var(--fs-sm);color:var(--sub);margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  /* テーブル */
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl thead th{position:sticky;top:0;background:var(--panel);text-align:right;font-size:11.5px;font-weight:700;color:var(--sub);
    padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:default;user-select:none;z-index:1}
  table.tbl thead th.l{text-align:left}
  table.tbl thead th.sortable{cursor:pointer}
  table.tbl thead th.sortable:hover{color:var(--ink)}
  table.tbl tbody td{text-align:right;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl tbody td.l{text-align:left;white-space:normal}
  table.tbl tbody tr{cursor:pointer}
  table.tbl tbody tr:hover{background:var(--accent-soft)}
  table.tbl tbody tr.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  table.tbl tbody tr:last-child td{border-bottom:none}
  .neg{color:var(--bad)}
  .pos{color:var(--good)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}
  .s-見込,.s-未着手{background:#9AA0A6}.s-進行{background:var(--accent)}.s-完了{background:var(--good)}.s-保留{background:var(--warn)}.s-失注{background:var(--bad)}
  .stbadge{font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:20px}
  .code{font-size:11px;font-weight:700;color:var(--sub);background:var(--accent-soft);padding:1px 7px;border-radius:6px}
  /* その場編集コントロール */
  .einput{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;padding:5px 8px;font-size:13px;font-family:inherit;max-width:210px;outline:none}
  .einput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .drow{align-items:center}
  .drow .einput{width:220px;max-width:220px;text-align:left}
  .drow>span:first-child{flex:none}
  select.einput{appearance:none;cursor:pointer}
  td .einput{width:100%;max-width:none;padding:4px 6px;text-align:inherit}
  td.ed{padding:6px 8px}
  .link{color:var(--accent);cursor:pointer}
  /* クリックで編集（経理セル等） */
  .fcell{cursor:text;border-radius:6px}
  .fcell:hover{box-shadow:inset 0 0 0 1px var(--line)}
  .editable-title{cursor:text;border-radius:6px;padding:1px 3px}
  .editable-title:hover{box-shadow:inset 0 0 0 1px var(--line)}
  /* ビュー切替 */
  .viewbar{display:inline-flex;gap:3px;background:var(--accent-soft);padding:3px;border-radius:10px}
  .viewbar button{border:none;background:transparent;color:var(--sub);font-weight:700;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer}
  .viewbar button.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  /* タスク担当チップ */
  .achips{display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center}
  .achip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .achip b{cursor:pointer;opacity:.6}.achip b:hover{opacity:1}
  .addasg{border:1px dashed var(--line);background:transparent;color:var(--sub);border-radius:20px;font-size:11.5px;padding:2px 8px;cursor:pointer;appearance:none}
  /* ボード */
  .board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
  .bcol{flex:0 0 280px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
  .bcol.over{border-color:var(--accent);background:var(--accent-soft)}
  .bcol-h{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;margin:2px 4px 10px}
  .bcol-h .c{margin-left:auto;color:var(--sub);font-weight:700;background:var(--panel);border-radius:10px;padding:0 8px}
  .bcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow);cursor:grab}
  .bcard.drag{opacity:.4}
  .bcard .bpj{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:3px}
  .bcard .bt{font-weight:700;font-size:13.5px;margin-bottom:6px}
  .bcard .bd{font-size:11.5px;color:var(--sub);margin-top:5px}
  /* タイムライン（ガント） */
  .gwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .grid-g{min-width:max-content}
  .grow{display:flex;align-items:stretch;border-top:1px solid var(--line);min-height:34px}
  .grow:first-child{border-top:none}
  .gname{position:sticky;left:0;z-index:5;width:250px;flex:none;background:var(--panel);border-right:1px solid var(--line);
    padding:7px 10px;font-size:12.5px;display:flex;align-items:center;gap:0;overflow:hidden;white-space:nowrap}
  .gnttl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .gnasg{margin-left:auto;padding-left:8px;flex:none;font-size:11px;font-weight:700;color:var(--accent);max-width:96px;overflow:hidden;text-overflow:ellipsis}
  .gaddbtn{margin-left:auto;flex:none;border:1px solid var(--line);background:var(--panel);color:var(--accent);border-radius:6px;width:22px;height:22px;font-size:13px;font-weight:800;cursor:pointer;line-height:1}
  .gaddbtn:hover{background:var(--accent-soft)}
  .gcells{position:relative;flex:none;overflow:hidden}
  .ghead .gname{background:var(--accent-soft);font-weight:800;z-index:6}
  .ghead{background:var(--accent-soft)}
  .gday{width:30px;flex:none;text-align:center;font-size:10.5px;color:var(--sub);padding:4px 0;line-height:1.25;border-left:1px solid var(--line)}
  .gday.we{background:rgba(0,0,0,.09)}.gday.td{background:#FDECEC;color:var(--bad);font-weight:700}   /* 週末は視認できる濃さに（L-5） */
  [data-theme="dark"] .gday.we{background:rgba(255,255,255,.07)}
  /* 月初セルの区切り（L-5）: ヘッダは左ボーダー強調、ボディは縦ラインを重畳 */
  .gday.mo{border-left:2px solid var(--sub)}
  .gmonth{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--sub);opacity:.3;z-index:0;pointer-events:none}
  .gproj .gname{font-weight:800;background:var(--bg)}
  .gproj .gcells{background:var(--bg)}
  .gbar{position:absolute;top:6px;height:21px;border-radius:6px;display:flex;align-items:center;color:#fff;font-size:10.5px;
    font-weight:700;padding:0 8px;overflow:hidden;white-space:nowrap;cursor:pointer;z-index:1}
  .gbar.s-未着手{background:#9AA0A6}.gbar.s-進行{background:var(--accent)}.gbar.s-完了{background:var(--good)}.gbar.s-保留{background:var(--warn)}
  .gtoday{position:absolute;top:0;bottom:0;width:2px;background:var(--bad);opacity:.6;z-index:2}
  .gfill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.32);border-right:1px solid rgba(255,255,255,.55)}
  .gpspan{position:absolute;top:13px;height:7px;border-radius:4px;background:var(--accent);opacity:.18;z-index:0}
  .gdead{position:absolute;top:2px;transform:translateX(-50%);color:var(--bad);font-size:13px;line-height:1;z-index:2;pointer-events:none}
  .gnmeta{flex:none;margin-left:auto;padding-left:8px;font-size:10.5px;font-weight:800;color:var(--bad);white-space:nowrap}
  .gproj .gaddbtn{margin-left:8px}
  .gasg{margin-left:6px;opacity:.85;font-weight:600}
  /* ガントバー・タスク名列のミニステータス操作 */
  .stmini{width:32px;flex:none;padding:2px 0;margin-right:6px;border:none;background:transparent;font-weight:800;text-align:center;cursor:pointer;font-family:inherit}
  .stmini.s-未着手{color:#9AA0A6}.stmini.s-進行{color:var(--accent)}.stmini.s-完了{color:var(--good)}.stmini.s-保留{color:var(--warn)}
  .bpop{display:none;position:fixed;z-index:200;min-width:190px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.28);padding:6px}
  .bpop.show{display:block}
  .bpop .bp-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;font-size:13.5px;cursor:pointer;white-space:nowrap}
  .bpop .bp-row:hover{background:var(--accent-soft)}
  .bpop .bp-sep{height:1px;background:var(--line);margin:6px 2px}
  .bpop .bp-dates{display:flex;gap:6px;padding:2px 9px}
  .bpop .bp-dates input{flex:1;min-width:0}
  .bpop .bp-link{display:block;padding:7px 9px;color:var(--accent);font-weight:700;cursor:pointer;font-size:13px}
  .bpop .bp-link:hover{background:var(--accent-soft);border-radius:7px}
  /* タスク状態の色分け（リスト） */
  .stpill{display:inline-block;font-size:10.5px;font-weight:800;padding:1px 8px;border-radius:20px;margin-right:6px;color:#fff;vertical-align:middle}
  .stpill.st-未着手{background:#9AA0A6}.stpill.st-進行{background:var(--accent)}.stpill.st-完了{background:var(--good)}.stpill.st-保留{background:var(--warn)}
  .trow.s-row-完了{opacity:.72}
  .trow.s-row-進行 td.l:nth-child(2){font-weight:600}
  .vlegend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--sub);margin:0 0 10px}
  .vlegend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
  /* タスク詳細モーダル */
  .tasklink{color:var(--accent);cursor:pointer;font-weight:600}
  .tasklink:hover{text-decoration:underline}
  .modal.wide{width:600px}
  .tm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tm-grid .field{margin:0}
  .sub-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line)}
  .sub-line:first-child{border-top:none}
  .sub-line .st{flex:1;min-width:0}
  .modal-b.scroll{max-height:calc(90vh - 120px);overflow:auto}
  /* master-detail */
  .md{display:grid;grid-template-columns:minmax(420px,1.1fr) minmax(360px,1fr);gap:16px;align-items:start}
  .md .list-card{max-height:calc(100dvh - 150px);overflow:auto}
  .md .detail-card{max-height:calc(100dvh - 150px);overflow:auto}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .input{width:auto;min-width:200px}
  .mfilt{position:relative;display:inline-block}
  .mfilt>.mbtn{display:flex;align-items:center;gap:8px;min-width:160px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:14px;color:var(--ink);cursor:pointer;font-family:inherit;text-align:left}
  .mfilt>.mbtn .car{margin-left:auto;opacity:.55;font-size:11px}
  .mfilt.open>.mpop{display:block}
  .mpop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:45;min-width:210px;max-height:300px;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.28);padding:6px}
  .mpop label{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;font-size:13.5px;cursor:pointer;white-space:nowrap}
  .mpop label:hover{background:var(--accent-soft)}
  .mpop label.me{font-weight:800}
  .mpop .sep{height:1px;background:var(--line);margin:4px 2px}
  .mpop input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex:none}
  .search{flex:1;min-width:220px}
  /* detail内 */
  .dh{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
  .dh .nm{font-size:18px;font-weight:800}
  .drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .drow .k{color:var(--sub)}
  .seclabel{font-size:11px;letter-spacing:1px;color:var(--sub);font-weight:700;text-transform:uppercase;margin:18px 0 8px}
  .ln{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .ln:last-child{border-bottom:none}
  .ln .a{margin-left:auto;font-weight:700}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(10,14,20,.45);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border-radius:14px;width:440px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  /* overflow:hiddenをやめた（モーダル内のmcheckドロップダウンが切れるため、M-8）。子は背景を持たないため角丸は崩れない */
  .modal-h{padding:16px 18px;border-bottom:1px solid var(--line);font-weight:800;font-size:15px}
  .modal-b{padding:18px}
  .modal-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  /* 変更履歴（案件詳細・M-9） */
  .log-d>summary{list-style:none;cursor:pointer}
  .log-d>summary::-webkit-details-marker{display:none}
  .log-d[open]>summary{background:var(--bg)}
  .log-row{display:flex;gap:8px;align-items:baseline;padding:8px 6px;border-bottom:1px solid var(--line);font-size:12.5px}
  .log-row .lw{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .log-row .lt{color:var(--sub);font-size:11px;flex:none;margin-left:auto;white-space:nowrap}
  .log-act{font-size:10.5px;padding:1px 6px;border-radius:8px;font-weight:700;flex:none}
  .la-INSERT{background:rgba(46,125,82,.14);color:var(--good)}
  .la-UPDATE{background:var(--accent-soft);color:var(--sub)}
  .la-DELETE{background:rgba(192,57,43,.12);color:var(--bad)}
  .log-diff{padding:8px 10px 10px;background:var(--bg);border-radius:0 0 8px 8px;font-size:12.5px}
  .log-diff .dl{padding:3px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:baseline}
  .log-diff .dk{font-weight:700;min-width:64px;color:var(--sub)}
  .log-diff .do{color:var(--bad);text-decoration:line-through}
  .log-diff .dn{color:var(--good);font-weight:600}
  /* login */
  .login-screen{height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 40px rgba(16,24,40,.1);padding:30px;width:380px;max-width:92vw}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 18px;color:var(--sub);font-size:13.5px}
  .login-card .field{margin-bottom:11px}
  .login-msg{color:var(--bad);font-size:13px;min-height:18px;margin-top:8px}
  .link{color:var(--accent);cursor:pointer;font-size:12.5px}
  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:#111418;color:#fff;
    padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:80;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:#C0392B!important;color:#fff;cursor:pointer}
  .switch{font-size:12px;color:var(--sub)}
  .switch a{color:var(--accent)}
  .pwbox{display:flex;gap:8px}
  .pwbox .input{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .role-tag{font-size:11.5px;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
  .impbar{display:none;margin:14px 28px 0;padding:10px 12px;border:2px solid #111;background:#fff;color:#111;align-items:center;gap:10px;font-size:13px;font-weight:800}
  .impbar.show{display:flex}
  .impbar .sub{font-weight:600;color:#555}
  /* ===== レスポンシブ ===== */
  /* 1024px前後: サイドバーを詰めて.mdの最小幅を下げ、横スクロールを防ぐ */
  @media (max-width:1024px){
    .side{width:190px;padding:18px 8px}
    .side-foot .me{overflow:hidden}
    .side-foot .me b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .md{grid-template-columns:minmax(390px,1.1fr) minmax(330px,1fr)}
  }
  /* 768px前後: 1カラム化。テーブルはcard-b内でoverflow-x:autoに逃がす */
  @media (max-width:768px){
    .side{width:150px}
    .brand{font-size:13px}
    .md{grid-template-columns:1fr}
    .grid2{grid-template-columns:1fr}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .card-b{overflow-x:auto}
  }
  /* 起動スプラッシュ（P4-9）: boot完了まで#login/#appは共にhiddenで白画面になるため上に重ねる */
  .splash{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .splash-logo{width:56px;height:56px;border-radius:14px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px}
  .splash-text{color:var(--sub);font-size:13.5px;font-weight:700}
  /* 通知バッジ（P4-8）: 自分宛て内注(依頼中)・自分の差戻経費の件数 */
  .nav a,.nav button{position:relative}
  .navbadge{position:absolute;top:6px;right:8px;min-width:16px;height:16px;padding:0 3px;border-radius:8px;
    background:var(--bad);color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center}
  /* 印刷（P4-12）: サイドバー/ツールバー類を消し、経理一覧・案件詳細をページ幅に収める */
  @media print{
    .side,.top,.toolbar,.btn,.toast,#modalRoot,#barPop{display:none!important}
    .app{display:block;height:auto}
    .main{overflow:visible}
    .content{overflow:visible;padding:0}
    .maxw{max-width:none;margin:0}
    .md{grid-template-columns:1fr}
    .md .list-card,.md .detail-card{max-height:none;overflow:visible}
    .card-b{max-height:none!important;overflow:visible!important}
    .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
    body{background:#fff}
  }
</style>
</head>
<body>

<!-- 起動スプラッシュ（P4-9）: boot完了で#hideSplashが隠す -->
<div id="splash" class="splash"><div class="splash-logo">⛺</div><div class="splash-text">読み込み中…</div></div>

<!-- ログイン -->
<div id="login" class="login-screen hidden">
  <div class="login-card">
    <h1>オフィスキャンプ</h1>
    <p>プロジェクト・経費・予定の管理（PC版）</p>
    <!-- form要素で包む: パスワードマネージャの保存/自動入力とEnter送信を成立させる（M-3） -->
    <form onsubmit="event.preventDefault();doLogin()">
      <div class="field"><label class="fl" for="lEmail">メール</label><input id="lEmail" class="input" type="email" autocomplete="username" placeholder="you@officecamp.jp"></div>
      <div class="field"><label class="fl" for="lPass">パスワード</label><input id="lPass" class="input" type="password" autocomplete="current-password" placeholder="パスワード"></div>
      <button class="btn" style="width:100%" type="submit">ログイン</button>
    </form>
    <div class="login-msg" id="lMsg"></div>
    <div style="text-align:center;margin-top:6px"><span class="link" onclick="magic()">初回ログイン・パスワードを忘れた方</span></div>
    <div style="text-align:center;margin-top:14px" class="switch">スマホで使う場合は <a href="app.html">スマホ版</a></div>
  </div>
</div>

<!-- アプリ -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="brand"><span class="logo">⛺</span> OFFICE CAMP</div>
    <nav class="nav" id="nav">
      <button type="button" data-v="ankens" onclick="go('ankens')"><span class="ic">▥</span> 案件</button>
      <button type="button" data-v="projects" onclick="go('projects')"><span class="ic">▤</span> プロジェクト</button>
      <button type="button" data-v="expenses" onclick="go('expenses')"><span class="ic">¥</span> 経費</button>
      <button type="button" data-v="tasks"    onclick="go('tasks')"><span class="ic">☷</span> タスク</button>
      <div class="navsec hidden" id="adminSec">管理</div>
      <button type="button" data-v="finance" id="financeNav" class="hidden" onclick="go('finance')"><span class="ic">▣</span> 経理</button>
      <button type="button" data-v="members" id="membersNav" class="hidden" onclick="go('members')"><span class="ic">👥</span> メンバー</button>
    </nav>
    <div class="side-foot">
      <div class="me"><b id="meName">—</b><span id="meRole">—</span></div>
      <button type="button" class="sfbtn" onclick="toggleTheme()"><span class="ic">◐</span> テーマ切替</button>
      <button type="button" class="sfbtn" onclick="openPwModal()"><span class="ic">🔑</span> パスワード</button>
      <button type="button" class="sfbtn" onclick="doLogout()"><span class="ic">⏻</span> ログアウト</button>
    </div>
  </aside>
  <main class="main">
    <header class="top">
      <h1 id="pageTitle">プロジェクト</h1>
      <div class="spacer"></div>
      <div id="topActions"></div>
    </header>
    <div id="impersonationBar" class="impbar"></div>
    <div class="content"><div class="maxw" id="content"></div></div>
  </main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<div id="barPop" class="bpop"></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js?v=22"></script>
<script>
let curView='projects', curProject=null, curAnken=null, curAnkens=[], curProjMeta=null, projSort={key:'profit',dir:-1};
// 経理ページ内モーダル（プロジェクト詳細のその場編集）・案件ページ内モーダル（案件詳細のその場編集）の状態。
// #projDetail とは描画先を分ける（id重複回避）。モーダルを閉じるとcloseModal()が両方ともnullに戻す。
let finModalId=null, finModalProj=null, finModalAnkens=[];
let ankModalId=null, amRecord=null;

// ---- 共通UI ----
// エラーは赤背景・5秒・タップで閉じる（M-5）。第2引数省略時は文言から自動判定。
function toast(m,isError){const t=document.getElementById('toast');
  if(isError===undefined)isError=/エラー|失敗|できません/.test(String(m));
  t.textContent=m;t.classList.toggle('err',!!isError);t.classList.add('show');
  t.onclick=()=>t.classList.remove('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),isError?5000:2200);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function applyTheme(){let t=null;try{t=localStorage.getItem('oc_theme');}catch(e){}if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.dataset.theme=t;}
function toggleTheme(){const c=document.documentElement.dataset.theme==='dark'?'dark':'light';const n=c==='dark'?'light':'dark';document.documentElement.dataset.theme=n;try{localStorage.setItem('oc_theme',n);}catch(e){}}
function modal(html){document.getElementById('modalRoot').innerHTML='<div class="ov" onclick="if(event.target===this)closeModal()">'+html+'</div>';}
// 経理/案件モーダルが「今まさに表示中」の時だけ閉じたと判定してid状態を戻す（M-close）。
// タスク追加等の一時フォームがモーダルを上書きしている間はid状態を保持し、保存後に元のモーダルへ復帰させる。
function closeModal(){
  const root=document.getElementById('modalRoot');
  const hasFin=!!root.querySelector('#finDetailModal'), hasAnk=!!root.querySelector('#ankDetailModal');
  if(hasFin)finModalId=null;
  if(hasAnk)ankModalId=null;
  // 経理/案件モーダルの上に開いた一時フォーム（＋タスク等）を Escape/オーバーレイで
  // 閉じた場合は全消しせず親モーダルへ戻す（cancelNestedModal と同挙動。状態残留の防止）。
  if(!hasFin&&!hasAnk&&(finModalId||ankModalId)&&root.innerHTML!==''){cancelNestedModal();return;}
  root.innerHTML='';
}
// ＋案件/＋タスク/＋経費フォームの「キャンセル」用。経理/案件モーダルの中から開いた一時フォームなら
// 全部閉じずに親モーダルへ戻す。単独で開いた場合（経費ビュー等）は通常どおり閉じる。
function cancelNestedModal(){
  if(finModalId){paintFinanceModal();return;}
  if(ankModalId){paintAnkenModal();return;}
  closeModal();
}
// 共通コンテキストメニュー（右クリック）。.mpop流用・画面端クランプ・既存のグローバルclickリスナーで閉じる。
// items: [{label,fn,danger,checked,disabled,sep}]
function ctxMenu(ev,items){
  ev.preventDefault();
  document.getElementById('ctxMenu')?.remove();
  const el=document.createElement('div');
  el.id='ctxMenu';el.className='mpop';
  el.style.cssText='position:fixed;display:block;z-index:90;left:'+Math.min(ev.clientX,window.innerWidth-230)+'px;top:'+Math.min(ev.clientY,window.innerHeight-items.length*34-16)+'px';
  items.forEach(it=>{
    if(it.sep){el.insertAdjacentHTML('beforeend','<div class="sep"></div>');return;}
    const row=document.createElement('label');
    row.textContent=(it.checked?'✓ ':'')+it.label;
    if(it.danger)row.style.color='var(--bad)';
    if(it.disabled){row.style.opacity='.5';row.style.cursor='default';}else{row.onclick=()=>{el.remove();it.fn&&it.fn();};}
    el.appendChild(row);
  });
  document.body.appendChild(el);
}
// キーボードショートカット（P2-5）: 1-5 タブ切替・/ 検索フォーカス・n 新規。Escapeはメニュー類→モーダルの順で閉じる。
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('ctxMenu')){document.getElementById('ctxMenu').remove();return;}
    const bp=document.getElementById('barPop');
    if(bp&&bp.classList.contains('show')){closeBarPop();return;}
    const mf=document.querySelector('.mfilt.open');
    if(mf){mf.classList.remove('open');return;}
    if(document.querySelector('.ov'))closeModal();
    return;
  }
  if(e.target.closest('input,select,textarea')||document.querySelector('.ov'))return;
  const viewByKey={'1':'ankens','2':'projects','3':'expenses','4':'tasks','5':'finance'};
  if(viewByKey[e.key]){go(viewByKey[e.key]);return;}
  if(e.key==='/'){
    const searchId={projects:'pSearch',finance:'fSearch',tasks:'tfQ'}[curView];
    if(searchId){e.preventDefault();document.getElementById(searchId)?.focus();}
    return;
  }
  if(e.key==='n'){
    const openByView={projects:()=>openProjModal(),expenses:()=>openExpModal(),tasks:()=>openTaskAddModal()}[curView];
    if(openByView)openByView();
  }
});

// ---- 認証 ----
async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const password=document.getElementById('lPass').value;
  const msg=document.getElementById('lMsg');
  if(!email||!password){msg.style.color='var(--bad)';msg.textContent='メールとパスワードを入力してください。';return;}
  msg.style.color='var(--sub)';msg.textContent='ログイン中…';
  const {error}=await OC.signIn(email,password);
  if(error){msg.style.color='var(--bad)';msg.textContent=(error.message==='Invalid login credentials')?'メールかパスワードが違います':('ログインできません: '+error.message);}
}
async function magic(){
  const email=document.getElementById('lEmail').value.trim();
  const msg=document.getElementById('lMsg');
  if(!email){msg.style.color='var(--bad)';msg.textContent='メールを入力してください。';return;}
  const {error}=await OC.sendMagic(email);
  msg.style.color=error?'var(--bad)':'var(--sub)';
  msg.textContent=error?('エラー: '+error.message):'メールのリンクから入って、左下「パスワード」で設定してください。';
}
async function doLogout(){OC.stopImpersonation();await OC.signOut();location.reload();}
function openPwModal(){
  modal('<div class="modal"><div class="modal-h">パスワードを設定 / 変更</div>'+
    '<form onsubmit="event.preventDefault();savePw()">'+
    '<div class="modal-b"><div class="field"><label class="fl">新しいパスワード（6文字以上）</label>'+
    '<input id="pwNew" class="input" type="password" autocomplete="new-password"></div></div>'+
    '<div class="modal-f"><button type="button" class="btn ghost" onclick="closeModal()">キャンセル</button>'+
    '<button type="submit" class="btn">設定</button></div></form></div>');
  setTimeout(()=>{const e=document.getElementById('pwNew');if(e)e.focus();},30);
}
async function savePw(){
  const p=document.getElementById('pwNew').value;
  if(!p||p.length<6){toast('6文字以上で入力してください');return;}
  const {error}=await OC.setPassword(p);
  if(error){toast('エラー: '+error.message);return;}
  closeModal();toast('パスワードを設定しました');
}

// ---- ルーティング ----
const TITLES={projects:'プロジェクト',ankens:'案件',expenses:'経費',finance:'経理',tasks:'タスク',members:'メンバー'};
function go(v,fromPop){
  if(!TITLES[v])v='projects';   // 不正・未知のハッシュはプロジェクトへフォールバック
  if(v==='finance' && !OC.isAccounting()){
    toast('経理ユーザーのみ閲覧できます');
    v='projects';
  }
  if(v==='members' && (!OC.isActualAdmin() || OC.impersonatingUser)){
    toast('管理者のみ利用できます');
    v='projects';
  }
  curView=v;
  // リロードで直前のviewへ戻れるようにhistoryへ同期（同一viewへの連続pushは抑止）。
  // popstate起点(fromPop)はpushStateすると再入ループになるためreplaceStateに留める。
  if(location.hash!=='#'+v){
    if(fromPop)history.replaceState(null,'','#'+v);
    else history.pushState(null,'','#'+v);
  }
  document.querySelectorAll('#nav [data-v]').forEach(a=>a.classList.toggle('on',a.dataset.v===v));
  document.getElementById('pageTitle').textContent=TITLES[v]||'';
  document.getElementById('topActions').innerHTML='';
  const c=document.getElementById('content');
  if(v==='projects')return renderProjects(c);
  if(v==='ankens')return renderAnkens(c);
  if(v==='expenses')return renderExpenses(c);
  if(v==='finance')return renderFinance(c);
  if(v==='tasks')return renderTasks(c);
  if(v==='members')return renderMembers(c);
}
// リロードで直前のviewに復元、Alt+←等のブラウザ戻る/進むにも追従
window.addEventListener('popstate',()=>{
  const h=(location.hash||'').slice(1);
  go(h||'projects',true);
});
function updateImpersonationBar(){
  const bar=document.getElementById('impersonationBar');
  if(!bar)return;
  if(!OC.impersonatingUser){
    bar.classList.remove('show');
    bar.innerHTML='';
    return;
  }
  const u=OC.impersonatingUser;
  bar.innerHTML=`<span>管理者として ${esc(u.name||u.email)} を代理操作中</span>
    <span class="sub">表示・作成主体は代理先ユーザー基準です</span>
    <span style="margin-left:auto"></span>
    <button class="btn ghost sm" onclick="stopImpersonation()">代理操作を終了</button>`;
  bar.classList.add('show');
}
// 管理セクション見出し: 中身（経理/メンバー）が両方 hidden なら見出しごと隠す
function syncAdminSec(){
  const hidden=id=>document.getElementById(id).classList.contains('hidden');
  document.getElementById('adminSec').classList.toggle('hidden',hidden('financeNav')&&hidden('membersNav'));
}
function refreshShell(){
  document.getElementById('meName').textContent=OC.meName||'—';
  document.getElementById('meRole').textContent=OC.myRole||'—';
  document.getElementById('financeNav').classList.toggle('hidden',!OC.isAccounting());
  document.getElementById('membersNav').classList.toggle('hidden',!OC.isActualAdmin()||!!OC.impersonatingUser);
  syncAdminSec();
  updateImpersonationBar();
}
function startImpersonation(userId){
  const p=OC.peopleById[userId]||{};
  const label=p.name||p.email||'このID';
  if(!confirm(label+' を代理操作します。管理者セッションのまま、画面と作成主体をこのユーザー基準に切り替えます。'))return;
  try{
    OC.startImpersonation(userId);
    OC.resetScope();
    curProject=null;curAnken=null;curProjMeta=null; // 代理切替でプロジェクト詳細ペインの残留を消す（権限外の財務が残る事故防止）
    toast(label+' を代理操作中');
    refreshShell();
    go('projects');
  }catch(e){toast('代理操作エラー: '+e.message);}
}
function stopImpersonation(){
  OC.stopImpersonation();
  OC.resetScope();
  curProject=null;curAnken=null;curProjMeta=null;   // 代理終了でも選択中のプロジェクトを破棄（対象基準の残留を消す）
  toast('代理操作を終了しました');
  refreshShell();
  go('projects');
}

// プロジェクト/案件タブを開いたまま経費・タスクを増減した時の再描画（選択中が案件なら案件詳細へ）
function refreshProjectDetailIfOpen(){
  if(curView==='projects'&&curProject){ if(curAnken)selectAnken(curProject,curAnken);else selectProject(curProject); }
  if(finModalId)paintFinanceModal();
  if(ankModalId)paintAnkenModal();
  if(curView==='expenses')refreshExpensesView();
}
// ---- プロジェクト（master-detail） ----
function projActions(){
  document.getElementById('topActions').innerHTML='<button class="btn" onclick="openProjModal()">＋ プロジェクトを追加</button>';
}
async function renderProjects(c){
  projActions();
  c.innerHTML='<div class="empty">読み込み中…</div>';
  if(!OC.projects.length){
    try{ await OC.loadProjects(); }
    catch(e){
      c.innerHTML='<div class="card"><div class="card-b empty">プロジェクトの読み込みに失敗しました：'+esc(e.message||e)+
        '<br><button class="btn ghost sm" style="margin-top:10px" onclick="renderProjects(document.getElementById(\'content\'))">↻ 再読み込み</button></div></div>';
      return;
    }
  }
  c.innerHTML=`
    <div id="projListWrap">
      <div class="toolbar">
        <input id="pSearch" class="input search" placeholder="🔍 プロジェクト名・番号・受注元" oninput="paintProjTable()">
        <select id="pStatus" class="input" onchange="paintProjTable()">
          <option value="">状態：すべて</option><option>見込</option><option>進行</option><option>完了</option><option>失注</option>
        </select>
      </div>
      <div class="card"><div id="projTable"></div></div>
    </div>
    <div id="projDetailWrap" class="hidden">
      <div class="card"><div class="card-b" id="projDetail"></div></div>
    </div>`;
  if(OC.isManager()){try{await OC.loadMyProjectIds();}catch(e){}}
  paintProjTable();
  if(curProject){ if(curAnken)await selectAnken(curProject,curAnken); else await selectProject(curProject); }
}
// 一覧⇄詳細の全幅切替（P8）。詳細表示中は一覧（検索/状態フィルタ含む）を隠す。
function backToProjectList(){
  curProject=null;curAnken=null;curProjMeta=null;
  document.getElementById('projDetailWrap')?.classList.add('hidden');
  document.getElementById('projListWrap')?.classList.remove('hidden');
  paintProjTable();
}
function projFiltered(){
  const q=(document.getElementById('pSearch')?.value||'').trim().toLowerCase();
  const st=document.getElementById('pStatus')?.value||'';
  return OC.projects.filter(p=>{
    if(OC.isManager()&&OC.myProjIds&&!OC.myProjIds.has(p.id))return false;
    if(st&&p.status!==st)return false;
    if(q&&!`${p.code||''} ${p.name||''} ${p.client||''}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function sortProj(key){if(projSort.key===key)projSort.dir*=-1;else projSort={key,dir:(key==='name'||key==='status')?1:-1};paintProjTable();}
function paintProjTable(){
  const rows=projFiltered();const {key,dir}=projSort;
  rows.sort((a,b)=>{let x=a[key],y=b[key];if(key==='name'){x=(a.code||'')+(a.name||'');y=(b.code||'')+(b.name||'');}
    if(typeof x==='string'||typeof y==='string')return String(x||'').localeCompare(String(y||''),'ja')*dir;return((x||0)-(y||0))*dir;});
  const ar=k=>projSort.key===k?(projSort.dir<0?' ▾':' ▴'):'';

const PSTATUS=['見込','進行','完了','失注'];
function pstatusOptions(cur){return PSTATUS.map(s=>`<option ${s===cur?'selected':''}>${s}</option>`).join('');}

// 金額の空欄確定はnull保存（未確定）。parseIntがNaNになる値もnullに寄せる。
function parseAmountOrNull(value){
  const s=String(value==null?'':value).trim().replace(/[,，]/g,'');
  if(s==='')return null;
  const n=parseInt(s,10);
  return isNaN(n)?null:n;
}
async function saveProjField(id,field,value){
  let v=value;
  if(field==='amount')v=parseAmountOrNull(value);
  const isAnken=curAnken===id;
  // 経理/案件モーダルの対象行はOC.projects（親行のみ）に無いことがあるため、開いているモーダルのキャッシュも見る。
  const p=isAnken?(curAnkens.find(x=>x.id===id)||{}):(ankModalId===id?(amRecord||{}):(OC.projects.find(x=>x.id===id)||{}));
  const refresh=()=>{
    if(curView==='finance')paintFinance();
    if(curView==='projects'){paintProjTable(); isAnken?selectAnken(curProject,id):selectProject(id);}
    if(curView==='tasks')paintTasks();
    if(finModalId===id)paintFinanceModal();
    if(ankModalId===id)paintAnkenModal();
    if(curView==='ankens')renderAnkensRefresh();
  };
  if(field==='name'&&!String(v||'').trim()){toast('プロジェクト名を入力してください');refresh();return;}
  if(field==='amount'&&v!=null&&v<0){toast('金額は0以上で入力してください');try{await OC.loadProjects();}catch(e){}refresh();return;}
  if((field==='start_date'||field==='delivery_date'||field==='end_date')&&value&&!saneDate(value)){toast('日付の年を確認してください（2000〜2100）');refresh();return;}
  if(field==='start_date'&&value&&p.delivery_date&&badRange(value,p.delivery_date)){toast('開始日は納品日以前にしてください');refresh();return;}
  if(field==='delivery_date'&&value&&p.start_date&&badRange(p.start_date,value)){toast('納品日は開始日以降にしてください');refresh();return;}
  if(field==='start_date'&&value&&p.end_date&&badRange(value,p.end_date)){toast('開始日は終了日以前にしてください');refresh();return;}
  if(field==='end_date'&&value&&p.start_date&&badRange(p.start_date,value)){toast('終了日は開始日以降にしてください');refresh();return;}
  if((field==='client'||field==='start_date'||field==='delivery_date'||field==='end_date'||field==='leader_id')&&v==='')v=null;
  const patch={};patch[field]=v;
  const {error}=await OC.updateProject(id,patch);
  if(error){
    toast('保存エラー: '+error.message);
    try{await OC.loadProjects();}catch(e){}
    refresh();
    return;
  }
  toast('保存しました');
  try{await OC.loadProjects();}catch(e){}
  refresh();
}

function ankenRowEdit(el,pid,ankenId,field){
  if(el.querySelector('select,input'))return;
  const a=curAnkens.find(x=>x.id===ankenId)||finModalAnkens.find(x=>x.id===ankenId);if(!a)return;
  const esck="if(event.key==='Escape'){this.dataset.esc='1';this.blur()}";
  const cancel=`if(curView==='projects')selectProject('${pid}');if(finModalId==='${pid}')paintFinanceModal();`;
  let ctrl;
  if(field==='amount'){
    ctrl=`<input class="einput" type="number" style="text-align:right;max-width:110px" value="${a.revenue==null?'':a.revenue}" onblur="if(!this.dataset.esc)saveAnkenRowField('${pid}','${ankenId}','amount',this.value);else{${cancel}}" onkeydown="if(event.key==='Enter')this.blur();${esck}">`;
  }else{
    ctrl=`<select class="einput" onchange="saveAnkenRowField('${pid}','${ankenId}','status',this.value)" onblur="if(this.dataset.esc){${cancel}}" onkeydown="${esck}">${pstatusOptions(a.status)}</select>`;
  }
  el.innerHTML=ctrl;
  const c=el.querySelector('select,input');
  if(c){c.focus();if(c.tagName==='INPUT')c.select();}
}
async function saveAnkenRowField(pid,ankenId,field,value){
  const patch={};
  if(field==='amount'){
    const v=parseAmountOrNull(value);
    if(v!=null&&v<0){toast('金額は0以上で入力してください');selectProject(pid);return;}
    patch.amount=v;
  }else{
    patch.status=value;
  }
  const {error}=await OC.updateProject(ankenId,patch);
  if(error){toast('保存エラー: '+error.message);if(curView==='projects')selectProject(pid);if(finModalId===pid)paintFinanceModal();return;}
  toast('保存しました');
  try{await OC.loadProjects();}catch(e){}
  if(curView==='projects')selectProject(pid);
  if(curView==='finance')paintFinance();
  if(finModalId===pid)paintFinanceModal();

// プロジェクトの複製（P3 #9）: 直下タスクの構造ごと複製する。日付・進捗・状態は引き継がず未着手、
// 親子構造は旧ID→新IDのマップで復元。経費・案件は複製しない。
async function duplicateProjectUI(id){
  const p=OC.projects.find(x=>x.id===id);
  if(!p)return;
  if(!confirm('プロジェクト「'+(p.name||'')+'」を直下タスクの構造ごと複製します。日付・進捗・状態は引き継がず未着手になります（経費・案件は複製しません）。よろしいですか？'))return;
  try{
    const detail=await OC.loadProjectDetail(id);
    const newName=(p.name||'')+'（コピー）';
    const payload={name:newName,client:detail.p.client||null,amount:p.revenue||0,
      leader_id:detail.p.leader_id||null,parent_id:null,owner_id:OC.effectiveUserId(),status:'進行'};
    const {data:newProj,error:e1}=await OC.addProject(payload).select().single();
    if(e1){toast('複製エラー: '+e1.message);return;}
    const tasks=(detail.tasks||[]).filter(t=>t.project_id===id);
    const idMap={};
    let remaining=[...tasks],guard=0,failCount=0;
    while(remaining.length&&guard++<50){
      const next=[];
      for(const t of remaining){
        if(t.parent_task_id&&!idMap[t.parent_task_id]){next.push(t);continue;}
        const {data:nt,error:e2}=await OC.addTask({project_id:newProj.id,title:t.title,
          leader_id:t.leader_id||null,status:'未着手',progress:0,
          parent_task_id:t.parent_task_id?idMap[t.parent_task_id]:null});
        if(!e2&&nt){
          idMap[t.id]=nt.id;
          for(const a of (t.task_assignees||[]))await OC.assignTask(nt.id,a.user_id);
        }else{
          failCount++;
        }
      }
      remaining=next;
    }
    failCount+=remaining.length; // 親の insert 失敗で試行されなかった子タスクの分
    const okCount=Object.keys(idMap).length;
    toast(failCount?'プロジェクト「'+newName+'」を複製しました（タスク'+okCount+'件・失敗'+failCount+'件）':'プロジェクト「'+newName+'」を複製しました（タスク'+okCount+'件）');
    try{await OC.loadProjects();}catch(e){}await OC.projectOptions();
    if(OC.isManager()){try{await OC.loadMyProjectIds();}catch(e){}}
    if(curView==='projects'){paintProjTable();selectProject(newProj.id);}
  }catch(e){toast('複製エラー: '+(e.message||e));}
}

// メンバー別粗利（リーダー/経理のみ表示）: 子案件の担当分＋プロジェクト直下リーダー分。ビュー化せずフロントで expenses から算出。
function computeMemberProfits(p,ankens,expenses){
  const chargedSum={};
  (expenses||[]).forEach(e=>{ if(!e.charged_user_id)return; chargedSum[e.charged_user_id]=(chargedSum[e.charged_user_id]||0)+(e.amount||0); });
  const byLeader={};
  (ankens||[]).forEach(a=>{ if(!a.leader_id)return; byLeader[a.leader_id]=(byLeader[a.leader_id]||0)+(a.revenue||0)+(a.client_billed||0); });
  const ids=new Set(Object.keys(byLeader));
  if(p.leader_id)ids.add(p.leader_id);
  return [...ids].map(uid=>{
    const profit=(uid===p.leader_id)
      ?(p.revenue||0)+(p.client_billed||0)-(p.anken_sum||0)-(chargedSum[uid]||0)
      :(byLeader[uid]||0)-(chargedSum[uid]||0);
    return {id:uid,name:OC.personName(uid),profit};
  }).sort((a,b)=>b.profit-a.profit);
}

// プロジェクト→案件のグループ台帳（spec: expense-ledger-and-project-detail §1-3）。
// 表示スコープ: 経理/管理者=全プロジェクト。プロジェクトリーダー(leader_id/owner_id=自分)=そのプロジェクト全体。
// それ以外=自分がleader_idの案件グループのみ（該当なしのプロジェクトは出さない。親見出しは文脈のみ）。
function expGroups(){
  const uid=OC.effectiveUserId(),manager=OC.isManager();
  const parents={};
  (expTreeCache||[]).forEach(row=>{ if(!row.parent_id)parents[row.id]={parent:row,children:[]}; });
  (expTreeCache||[]).forEach(row=>{ if(row.parent_id&&parents[row.parent_id])parents[row.parent_id].children.push(row); });
  const groups=[];
  Object.values(parents).forEach(g=>{
    const bucket=(g.parent.status==='見込'||g.parent.status==='進行')?'active':'done';
    if(bucket!==expStatusSeg)return;
    const full=manager||g.parent.leader_id===uid||g.parent.owner_id===uid;
    const children=(full?g.children:g.children.filter(a=>a.leader_id===uid)).slice()
      .sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'ja'));
    if(!full&&!children.length)return;
    groups.push({parent:g.parent,children,full});
  });
  return groups.sort((a,b)=>String(a.parent.name||'').localeCompare(String(b.parent.name||''),'ja'));
}
function paintExpenses(){
  document.getElementById('segActive')?.classList.toggle('on',expStatusSeg==='active');
  document.getElementById('segDone')?.classList.toggle('on',expStatusSeg==='done');
  const groups=expGroups();
  const total=groups.reduce((s,g)=>s+(g.full?(g.parent.tree_cost||0):g.children.reduce((s2,a)=>s2+(a.cost||0),0)),0);
  const capped=expCache.length>=500;   // 500件上限に達したら経費行は過少（全社の正は経理タブ）
  const summary=document.getElementById('expSummary');
  if(summary)summary.innerHTML=`経費計 <b style="color:var(--ink);font-size:15px">${OC.yen(total)}</b>${capped?'<span style="color:#c0392b">（経費一覧は直近500件・全件合計は経理タブ参照）</span>':''}`;
  const body=document.getElementById('expBody');
  if(!body)return;
  if(!groups.length){body.innerHTML='<div class="card"><div class="card-b empty">'+(expStatusSeg==='active'?'進行前・進行中の':'完了の')+'プロジェクトがありません</div></div>';return;}
  const expByProj={};
  (expCache||[]).forEach(e=>{(expByProj[e.project_id]=expByProj[e.project_id]||[]).push(e);});
  body.innerHTML=groups.map(g=>{
    const p=g.parent;
    const directExp=g.full?(expByProj[p.id]||[]):[];
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-h" style="align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div>${p.code?'<span class="code">'+esc(p.code)+'</span> ':''}${esc(p.name||'—')}</div>
          <div class="muted" style="font-size:11.5px;font-weight:600;margin-top:3px">${esc(p.leader_id?OC.personName(p.leader_id):'—')}　金額 ${p.revenue==null?'—':OC.yen(p.revenue)}　発注計 ${OC.yen(p.anken_sum)}　経費計 ${OC.yen(p.tree_cost)}</div>
        </div>
        ${g.full?`<button class="btn ghost sm" onclick="openExpModal('${p.id}')">＋ 経費</button>`:''}
      </div>
      <div class="card-b" style="padding:8px 16px 14px">
        ${directExp.length?directExp.map(e=>expenseLineHTML(e,false)).join(''):(g.full?'<div class="muted" style="font-size:12.5px;padding:6px 0">プロジェクト直下の経費はありません</div>':'')}
        ${g.children.length?g.children.map(a=>ankenExpGroupHTML(p,a,expByProj[a.id]||[])).join(''):'<div class="muted" style="font-size:13px;padding:6px 0">案件がありません</div>'}
      </div>
    </div>`;
  }).join('');
}

async function duplicateTaskUI(id){
  const t=tasksCache.find(x=>x.id===id);
  if(!t)return;
  const newTitle=(t.title||'')+'（コピー）';
  const {data:nt,error}=await OC.addTask({project_id:t.project_id,title:newTitle,leader_id:t.leader_id||null,
    parent_task_id:t.parent_task_id||null,status:'未着手',progress:0});
  if(error){toast('複製エラー: '+error.message);return;}
  for(const a of (t.task_assignees||[]))await OC.assignTask(nt.id,a.user_id);

// 引数（既存の呼び出し元が渡すプロジェクト/案件どちらのid）から1段目・2段目の初期選択を割り出す
function resolveExpProjSelection(projectId){
  const opts=OC.projOpts||[];
  if(!projectId){
    const firstParent=opts.find(p=>!p.parent_id);
    return {parentId:firstParent?firstParent.id:'',childId:firstParent?firstParent.id:''};
  }
  const row=opts.find(p=>p.id===projectId);
  if(!row)return {parentId:'',childId:''};
  return row.parent_id?{parentId:row.parent_id,childId:row.id}:{parentId:row.id,childId:row.id};
}

async function saveExp(){
  const amount=parseInt((document.getElementById('eAmt').value||'0').replace(/[,，]/g,''),10)||0;

  const note=document.getElementById('eMemo').value.trim();

  const chargeVal=document.getElementById('eCharge').value;
  const charge_to=chargeVal==='self'?'self':chargeVal==='client'?'client':'member';
  const charged_user_id=chargeVal==='self'?OC.effectiveUserId():chargeVal==='client'?null:chargeVal;
  document.getElementById('eSave').disabled=true;

  if(error){toast('記録エラー: '+error.message);document.getElementById('eSave').disabled=false;return;}
  closeModal();toast(OC.yen(amount)+' を記録しました');
  refreshProjectDetailIfOpen();
}

function finFiltered(){
  const q=(document.getElementById('fSearch')?.value||'').trim().toLowerCase();

  const ld=document.getElementById('fLeader')?.value||'';
  const mo=document.getElementById('fMonth')?.value||'';
  return OC.projects.filter(p=>{

    if(ld&&p.leader_id!==ld)return false;
    if(mo&&ym(p.delivery_date)!==mo)return false;

function exportFinanceCSV(){
  const rows=finFiltered();

  const q=s=>{s=String(s==null?'':s);return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const lines=[head.join(',')].concat(rows.map(p=>[p.code||'',p.name||'',p.client||'',p.status||'',
    p.leader_id?OC.personName(p.leader_id):'',p.revenue==null?'—':p.revenue,p.anken_sum||0,p.tree_cost||0,p.tree_client||0,p.profit==null?'—':p.profit,p.delivery_date||''].map(q).join(',')));
  const csv='﻿'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='officecamp-keiri-'+new Date().toISOString().slice(0,10)+'.csv';

function mcheck(id,base,items,selected,handler){
  handler=handler||'onFilterCheck';

  return `<div class="mfilt" id="mf_${id}"><button type="button" class="mbtn" onclick="toggleMfilt('${id}')"><span id="mfsum_${id}">${esc(summary)}</span><span class="car">▾</span></button><div class="mpop">${rows}</div></div>`;

// --- タイムライン（ガント） ---
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pD(s){return new Date(s+'T00:00:00');}
// 日付バリデーション（年のタイポでタイムライン全滅を防ぐ／開始>終了の逆転を防ぐ）
function saneDate(v){ if(!v)return true; const y=+String(v).slice(0,4); return y>=2000&&y<=2100; }
function badRange(s,e){ return !!(s&&e&&s>e); }  // ISO文字列比較で 開始>終了 を検出
function dDiff(a,b){return Math.round((pD(b)-pD(a))/86400000);}
function mmdd(s){const d=pD(s);return (d.getMonth()+1)+'/'+d.getDate();}
function paintTaskTimeline(body){
  const pmap=Object.fromEntries((OC.projects||[]).map(p=>[p.id,p]));
  const groups=taskGroups();
  const dated=visibleTasks().filter(t=>t.start_date||t.end_date);
  const hasProjDate=groups.some(g=>{const p=pmap[(g.items[0]||{}).project_id];return p&&(p.delivery_date||p.start_date);});
  if(!dated.length&&!hasProjDate){body.innerHTML='<div class="card"><div class="card-b empty">日付の入ったタスク・プロジェクト期限がありません（リスト/ボードで日付を入れると表示されます）</div></div>';return;}
  // 範囲＝タスク日付＋プロジェクト(開始/納品)＋今日。未来側に余白を持たせ「先の日付まで」見えるようにする。
  const today=ymd(new Date());
  let min=today,max=today;
  const push=d=>{if(!d)return;if(d<min)min=d;if(d>max)max=d;};
  dated.forEach(t=>{push(t.start_date);push(t.end_date);});
  groups.forEach(g=>{const p=pmap[(g.items[0]||{}).project_id];if(p){push(p.start_date);push(p.delivery_date);}});
  let minD=ymd((d=>{d.setDate(d.getDate()-7);return d;})(pD(min)));
  const t45=ymd((d=>{d.setDate(d.getDate()+45);return d;})(pD(today)));         // 今日から最低45日先まで
  let maxBase=max>t45?max:t45;
  let maxD=ymd((d=>{d.setDate(d.getDate()+3);return d;})(pD(maxBase)));
  if(dDiff(minD,maxD)>560)minD=ymd((d=>{d.setDate(d.getDate()-560);return d;})(pD(maxD))); // 幅の暴走防止：過去の外れ値ではなく今日・未来側を残す（外れ値は左端でクリップ）
  const n=dDiff(minD,maxD)+1, W=30, totalW=n*W;
  const days=[];for(let i=0;i<n;i++){const d=pD(minD);d.setDate(d.getDate()+i);days.push(d);}
  const todayLeft=(today>=minD&&today<=maxD)?dDiff(minD,today)*W:-1;
  // 月初の縦区切り（L-5）。今日ラインと同様に全行のgcellsへ重畳する
  let monthLines='';
  days.forEach((d,i)=>{if(d.getDate()===1&&i>0)monthLines+=`<div class="gmonth" style="left:${i*W}px"></div>`;});
  const todayBar=(todayLeft>=0?`<div class="gtoday" style="left:${todayLeft+W/2}px"></div>`:'')+monthLines;
  const head=`<div class="grow ghead"><div class="gname">プロジェクト / タスク</div><div class="gcells" style="width:${totalW}px;display:flex">${days.map(d=>{
    const wd=d.getDay();const ds=ymd(d);return `<div class="gday ${wd===0||wd===6?'we':''} ${ds===today?'td':''} ${d.getDate()===1?'mo':''}">${d.getMonth()+1}/${d.getDate()}<br>${'日月火水木金土'[wd]}</div>`;}).join('')}</div></div>`;
  const bar=t=>{if(!t.start_date||!t.end_date)return '';const left=dDiff(minD,t.start_date)*W;const w=(dDiff(t.start_date,t.end_date)+1)*W;
    const who=(t.task_assignees||[]).map(a=>esc(OC.personName(a.user_id))).join('・');
    return `<div class="gbar s-${t.status||'未着手'}" style="left:${left}px;width:${Math.max(w-3,10)}px" onclick="openBarPop(event,'${t.id}')" oncontextmenu="taskCtx(event,'${t.id}')" title="${esc(t.title)}（${esc(t.status||'未着手')}${who?'・'+who:''}）"><span style="position:relative;z-index:1">${esc(t.title)}</span></div>`;};
  const rows=groups.map(g=>{
    const pid=(g.items[0]||{}).project_id;
    const proj=pmap[pid]||g.proj||{};
    const projName=`${g.proj?.code?'['+esc(g.proj.code)+'] ':''}${esc(g.proj?.name||'プロジェクトなし')}`;
    let projMarks=todayBar;
    if(proj.start_date&&proj.delivery_date&&proj.delivery_date>=minD&&proj.start_date<=maxD){
      const s=proj.start_date<minD?minD:proj.start_date;const e=proj.delivery_date>maxD?maxD:proj.delivery_date;
      projMarks+=`<div class="gpspan" style="left:${dDiff(minD,s)*W}px;width:${Math.max((dDiff(s,e)+1)*W-2,4)}px" title="プロジェクト期間 ${esc(proj.start_date)}〜${esc(proj.delivery_date)}"></div>`;
    }
    if(proj.delivery_date&&proj.delivery_date>=minD&&proj.delivery_date<=maxD){
      projMarks+=`<div class="gdead" style="left:${dDiff(minD,proj.delivery_date)*W+W/2}px" title="納品期限 ${esc(proj.delivery_date)}">◆</div>`;
    }
    const deadMeta=proj.delivery_date?`<span class="gnmeta" title="納品期限 ${esc(proj.delivery_date)}">◆納品 ${mmdd(proj.delivery_date)}</span>`:'';
    const projRow=`<div class="grow gproj"><div class="gname"><span class="gnttl">${pid?`<span class="tasklink" onclick="openProjPop(event,'${pid}')">${projName}</span>`:projName}</span>${deadMeta}${pid?`<button class="gaddbtn" title="タスクを追加" onclick="openTaskAddModal('${pid}')">＋</button>`:''}</div><div class="gcells" style="width:${totalW}px">${projMarks}</div></div>`;
    const taskRow=t=>{const who=(t.task_assignees||[]).map(a=>esc(OC.personName(a.user_id))).join('・');
      return `<div class="grow"><div class="gname">${statusSelMini(t)}<span class="gnttl"><span class="tasklink" onclick="openTaskModal('${t.id}')">${esc(t.title)}</span></span>${who?'<span class="gnasg">'+who+'</span>':''}</div><div class="gcells" style="width:${totalW}px">${todayBar}${bar(t)}</div></div>`;};
    return projRow+g.items.map(taskRow).join('');
  }).join('');
  body.innerHTML=`<div class="vlegend">
      <span><i style="background:#9AA0A6"></i>未着手</span><span><i style="background:var(--accent)"></i>進行</span>
      <span><i style="background:var(--good)"></i>完了</span><span><i style="background:var(--warn)"></i>保留</span>
      <span style="color:var(--bad)">┃今日</span><span style="color:var(--bad)">◆プロジェクトの納品期限</span><span>未来45日先まで表示。バーをクリックで状態・日付を変更。</span></div>
    <div class="gwrap"><div class="grid-g">${head}${rows}</div></div>`;
  const w=body.querySelector('.gwrap');
  if(w&&todayLeft>=0)w.scrollLeft=Math.max(0,todayLeft-w.clientWidth*0.3);
}

function genPassword(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
  const symbols='!@#$%';
  const bytes=new Uint8Array(14);
  crypto.getRandomValues(bytes);
  let s='Oc';
  bytes.forEach((b,i)=>{s+= i%5===4 ? symbols[b%symbols.length] : chars[b%chars.length];});
  return s;
}

  const base=['メンバー','経理','管理者'];

  const list=(!selected||base.includes(selected))?base:[selected,...base];
  return list.map(r=>`<option value="${esc(r)}" ${r===selected?'selected':''}>${esc(r)}</option>`).join('');
}

function openMemberModal(){
  const pw=genPassword();
  modal(`<div class="modal"><div class="modal-h">メンバーID/PWを発行</div><div class="modal-b">
    <div class="field"><label class="fl" for="mName">名前</label><input id="mName" class="input" placeholder="例）丹羽 駿介"></div>
    <div class="field"><label class="fl" for="mEmail">メール（ログインID）</label><input id="mEmail" class="input" type="email" autocomplete="off" placeholder="name@example.com"></div>
    <div class="field"><label class="fl">初期パスワード</label><div class="pwbox"><input id="mPass" class="input" value="${esc(pw)}"><button class="btn ghost sm" onclick="document.getElementById('mPass').value=genPassword()">再生成</button></div></div>
    <div class="field"><label class="fl" for="mRole">ロール</label><select id="mRole" class="input">${roleOptions('メンバー')}</select></div>
    <div class="field"><label class="fl">所属部署（最大3）</label>${mcheck('mDepts','所属部署',OC.departments.map(d=>({v:d.id,label:d.name})),[],'onMpickChange')}</div>
    <div class="muted" style="font-size:12px;line-height:1.6">発行後、このメールと初期パスワードを本人に渡してください。本人はログイン後に左下「パスワード」から変更できます。</div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="mSave" onclick="saveMember()">発行</button></div></div>`);
  setTimeout(()=>{const e=document.getElementById('mName');if(e)e.focus();},30);
}
async function saveMember(){
  const name=document.getElementById('mName').value.trim();
  const email=document.getElementById('mEmail').value.trim();
  const password=document.getElementById('mPass').value;
  const role=document.getElementById('mRole').value;
  const department_ids=mpickValues('mDepts');
  if(!name){toast('名前を入力してください');return;}
  if(!email){toast('メールを入力してください');return;}
  if(!password||password.length<6){toast('パスワードは6文字以上にしてください');return;}
  if(department_ids.length>3){toast('所属部署は最大3つまでです');return;}
  document.getElementById('mSave').disabled=true;
  try{
    await OC.createMember({name,email,password,role,department_ids});
    await OC.loadPeople();
    closeModal();
    toast('メンバーを発行しました');
    renderMembers(document.getElementById('content'));
  }catch(e){
    toast('発行エラー: '+e.message);
    document.getElementById('mSave').disabled=false;
  }
}
function openMemberEdit(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  const isSelf=userId===OC.me.id;
  modal(`<div class="modal"><div class="modal-h">メンバーを編集</div><div class="modal-b">
    <div class="field"><label class="fl" for="emName">名前</label><input id="emName" class="input" value="${esc(p.name||'')}"></div>
    <div class="field"><label class="fl">メール（ログインID）</label><input class="input" value="${esc(p.email||'')}" disabled></div>
    <div class="field"><label class="fl" for="emRole">ロール</label><select id="emRole" class="input">${roleOptions(p.role||'メンバー')}</select></div>
    <div class="field"><label class="fl">所属部署（最大3）</label>${mcheck('emDepts','所属部署',OC.departments.map(d=>({v:d.id,label:d.name})),OC.peopleDepts[userId]||[],'onMpickChange')}</div>
    <div class="muted" style="font-size:12px;line-height:1.6">ロールは権限、所属部署は所属先です。建築/デザイン/SEなどは部署側で管理します。</div>
    <div style="border-top:1px solid var(--line,#e5e5e5);margin-top:16px;padding-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="resetMemberPasswordUI('${userId}')">パスワード初期化</button>
      ${isSelf?'':`<button class="btn sm" style="background:#c0392b;color:#fff;border-color:#c0392b" onclick="closeModal();openMemberDeleteConfirm('${userId}')">このメンバーを削除…</button>`}
    </div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="emSave" onclick="saveMemberEdit('${userId}')">保存</button></div></div>`);
}
async function resetMemberPasswordUI(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  if(!confirm(`${p.name||p.email} さんのパスワードを初期化します。\n新しいパスワードが発行され、本人の現在のパスワードは使えなくなります。\nよろしいですか？`))return;
  try{
    const r=await OC.resetMemberPassword(userId);
    modal(`<div class="modal"><div class="modal-h">パスワードを初期化しました</div><div class="modal-b">
      <div class="muted" style="margin-bottom:8px">${esc(r.name||p.name)}（${esc(r.email||p.email)}）の新しいパスワードです。<b style="color:#c0392b">この画面を閉じると二度と表示されません。</b>今すぐ本人に伝えてください。</div>
      <div class="pwbox"><input id="rpwOut" class="input" value="${esc(r.password)}" readonly onclick="this.select()"><button class="btn ghost sm" onclick="navigator.clipboard.writeText(document.getElementById('rpwOut').value);toast('コピーしました')">コピー</button></div>
      </div><div class="modal-f"><button class="btn" onclick="closeModal()">閉じる</button></div></div>`);
  }catch(e){toast('初期化エラー: '+e.message);}
}
function openMemberDeleteConfirm(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  const name=p.name||p.email||'';
  modal(`<div class="modal"><div class="modal-h" style="color:#c0392b">⚠ メンバーを削除</div><div class="modal-b">
    <div style="background:#fdecea;color:#7a1f18;border:1px solid #f5c6cb;border-radius:8px;padding:12px;margin-bottom:12px;line-height:1.7">
      <b>${esc(name)}</b>（${esc(p.email||'')}）を削除しようとしています。<br>
      ・ログインは<b>即座に無効化</b>され、二度とログインできなくなります。<br>
      ・この操作は<b>取り消せません</b>。<br>
      ・過去のタスク・経費・発注などの履歴がある場合、記録保護のためメンバー一覧には「ログイン不可」の状態で残ることがあります（履歴データは消えません）。<br>
      ・本当に削除する場合のみ、下に <b>${esc(name)}</b> と正確に入力してください。
    </div>
    <input id="delConfirmInput" class="input" data-n="${esc(name)}" placeholder="${esc(name)} と入力" oninput="document.getElementById('delConfirmBtn').disabled=(this.value!==this.dataset.n)">
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="delConfirmBtn" style="background:#c0392b;color:#fff;border-color:#c0392b" disabled onclick="confirmDeleteMember('${userId}')">削除する</button></div></div>`);
}
async function confirmDeleteMember(userId){
  const btn=document.getElementById('delConfirmBtn');
  btn.disabled=true;
  try{
    const r=await OC.deleteMember(userId);
    await OC.loadPeople();
    closeModal();
    if(r.historyKept){
      toast(`${r.name||''} さんのログインを無効化しました（履歴があるため一覧には残ります）`);
    }else{
      toast(`${r.name||''} さんを削除しました`);
    }
    renderMembers(document.getElementById('content'));
  }catch(e){
    toast('削除エラー: '+e.message);
    btn.disabled=false;
  }
}
async function saveMemberEdit(userId){
  const name=document.getElementById('emName').value.trim();
  const role=document.getElementById('emRole').value;
  const department_ids=mpickValues('emDepts');
  if(!name){toast('名前を入力してください');return;}
  if(department_ids.length>3){toast('所属部署は最大3つまでです');return;}
  document.getElementById('emSave').disabled=true;
  try{
    await OC.updateMember({id:userId,name,role,department_ids});
    await OC.loadPeople();
    if(userId===OC.me.id)await OC.loadMe();
    closeModal();
    toast('メンバーを更新しました');
    renderMembers(document.getElementById('content'));
    document.getElementById('meName').textContent=OC.meName||'—';
    document.getElementById('meRole').textContent=OC.myRole||'—';
    document.getElementById('financeNav').classList.toggle('hidden',!OC.isAccounting());
    document.getElementById('membersNav').classList.toggle('hidden',OC.myRole!=='管理者');
    syncAdminSec();
  }catch(e){
    toast('更新エラー: '+e.message);
    document.getElementById('emSave').disabled=false;
  }
}

// ---- 起動 ----
async function boot(){
  await OC.loadMe();
  document.getElementById('meName').textContent=OC.meName||'—';
  document.getElementById('meRole').textContent=OC.myRole||'—';
  await Promise.all([OC.loadPeople(),OC.loadDepartments(),OC.loadVendors(),OC.projectOptions()]);
  try{ await OC.loadProjects(); }catch(e){ console.error('[boot] loadProjects失敗',e); }
  refreshShell();
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  hideSplash();
  if(OC.impersonatingUser)toast('前回の代理操作（'+(OC.impersonatingUser.name||OC.impersonatingUser.email)+'）を継続中');
  const h=(location.hash||'').slice(1);
  go(h||'projects',true);   // リロード時は直前のviewへ復元（無ければプロジェクト）。fromPop=trueでpush抑止
}
// 起動スプラッシュ（P4-9）: ログイン画面・オフライン検知など、boot以外でも画面を出す直前に隠す
function hideSplash(){ document.getElementById('splash')?.classList.add('hidden'); }
(async function init(){
  applyTheme();
  try{
    if(typeof supabase==='undefined')throw new Error('オフライン: supabase-jsを読み込めませんでした');
    if(!OC.init()){document.getElementById('login').classList.remove('hidden');
      document.getElementById('lMsg').textContent='Supabase未設定（config.js）';hideSplash();return;}
    const session=await OC.session();
    if(!session){
      document.getElementById('login').classList.remove('hidden');
      hideSplash();
      let booted=false; OC.onAuth(s=>{if(s&&!booted){booted=true;boot();}});
    } else boot();
  }catch(e){
    console.error('[init] 失敗',e);
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('lMsg').textContent='オフラインです。電波の良い場所で再読み込みしてください。';
    hideSplash();
  }
})();
</script>
</body>
