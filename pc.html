<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024">
<title>オフィスキャンプ（PC）</title>
<style>
  :root{
    --bg:#F6F7F9;--panel:#FFFFFF;--side:#0E1116;--side-ink:#C7CCD4;
    --ink:#1A1D21;--sub:#7B828C;--line:#E7E9ED;--accent:#2D6CDF;--accent-soft:#EAF1FD;
    --good:#2E7D52;--bad:#C0392B;--warn:#B8860B;--radius:12px;--side-active:#1C2230;
    --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  }
  [data-theme="dark"]{
    --bg:#0F1115;--panel:#171A1F;--side:#0A0C10;--side-ink:#AEB6C2;--side-active:#1E2530;
    --ink:#E8EAED;--sub:#8A929E;--line:#262A31;--accent:#5B8DEF;--accent-soft:#1A2433;
    --good:#4FAF7C;--bad:#E5705F;--warn:#D4A24B;--shadow:0 1px 3px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",Segoe UI,sans-serif;font-size:14px}
  .hidden{display:none!important}
  button{font-family:inherit}
  /* ===== シェル ===== */
  .app{display:flex;height:100dvh}
  .side{width:236px;flex:none;background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;padding:18px 12px}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 10px 18px;font-weight:800;letter-spacing:.5px;color:#fff;font-size:15px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-weight:600;font-size:13.5px;user-select:none}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.on{background:var(--side-active);color:#fff}
  .nav a .ic{width:18px;height:18px;flex:none;opacity:.9}
  .nav .navsec{font-size:10px;letter-spacing:1.5px;color:#5b626d;font-weight:700;padding:14px 12px 6px}
  .side-foot{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:8px;display:flex;flex-direction:column;gap:2px}
  .side-foot .me{padding:6px 12px;font-size:12px;color:#8b929d}
  .side-foot .me b{color:#fff;display:block;font-size:13px}
  /* ===== メイン ===== */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{height:62px;flex:none;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:16px;padding:0 26px}
  .top h1{margin:0;font-size:18px;font-weight:800}
  .top .spacer{flex:1}
  .content{flex:1;overflow:auto;padding:24px 26px}
  .maxw{max-width:1280px;margin:0 auto}
  /* ===== 部品 ===== */
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;transition:filter .12s}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--accent-soft);filter:none}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .input,select.input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:14px;color:var(--ink);outline:none;font-family:inherit}
  .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  select.input{appearance:none}
  label.fl{display:block;font-size:12px;font-weight:700;color:var(--sub);margin:0 2px 5px}
  .field{margin-bottom:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px}
  .card-b{padding:16px}
  .muted{color:var(--sub)}
  .empty{color:var(--sub);text-align:center;padding:34px 10px;font-size:13.5px}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
  .kpi .l{font-size:12px;color:var(--sub);font-weight:700}
  .kpi .n{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .kpi .s{font-size:12px;color:var(--sub);margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  /* テーブル */
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl thead th{position:sticky;top:0;background:var(--panel);text-align:right;font-size:11.5px;font-weight:700;color:var(--sub);
    padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;z-index:1}
  table.tbl thead th.l{text-align:left}
  table.tbl thead th:hover{color:var(--ink)}
  table.tbl tbody td{text-align:right;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl tbody td.l{text-align:left;white-space:normal}
  table.tbl tbody tr{cursor:pointer}
  table.tbl tbody tr:hover{background:var(--accent-soft)}
  table.tbl tbody tr.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  table.tbl tbody tr:last-child td{border-bottom:none}
  .neg{color:var(--bad)}
  .pos{color:var(--good)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}
  .s-見込,.s-未着手{background:#9AA0A6}.s-進行{background:var(--accent)}.s-完了{background:var(--good)}.s-失注,.s-保留{background:var(--warn)}
  .stbadge{font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:20px}
  .code{font-size:11px;font-weight:700;color:var(--sub);background:var(--accent-soft);padding:1px 7px;border-radius:6px}
  /* その場編集コントロール */
  .einput{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;padding:5px 8px;font-size:13px;font-family:inherit;max-width:210px;outline:none}
  .einput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .drow{align-items:center}
  .drow .einput{width:220px;max-width:220px;text-align:left}
  .drow>span:first-child{flex:none}
  select.einput{appearance:none;cursor:pointer}
  td .einput{width:100%;max-width:none;padding:4px 6px;text-align:inherit}
  td.ed{padding:6px 8px}
  .link{color:var(--accent);cursor:pointer}
  /* クリックで編集（経理セル等） */
  .fcell{cursor:text;border-radius:6px}
  .fcell:hover{box-shadow:inset 0 0 0 1px var(--line)}
  .editable-title{cursor:text;border-radius:6px;padding:1px 3px}
  .editable-title:hover{box-shadow:inset 0 0 0 1px var(--line)}
  /* ビュー切替 */
  .viewbar{display:inline-flex;gap:3px;background:var(--accent-soft);padding:3px;border-radius:10px}
  .viewbar button{border:none;background:transparent;color:var(--sub);font-weight:700;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer}
  .viewbar button.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  /* タスク担当チップ */
  .achips{display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center}
  .achip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .achip b{cursor:pointer;opacity:.6}.achip b:hover{opacity:1}
  .addasg{border:1px dashed var(--line);background:transparent;color:var(--sub);border-radius:20px;font-size:11.5px;padding:2px 8px;cursor:pointer;appearance:none}
  /* ボード */
  .board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
  .bcol{flex:0 0 280px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
  .bcol.over{border-color:var(--accent);background:var(--accent-soft)}
  .bcol-h{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;margin:2px 4px 10px}
  .bcol-h .c{margin-left:auto;color:var(--sub);font-weight:700;background:var(--panel);border-radius:10px;padding:0 8px}
  .bcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow);cursor:grab}
  .bcard.drag{opacity:.4}
  .bcard .bpj{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:3px}
  .bcard .bt{font-weight:700;font-size:13.5px;margin-bottom:6px}
  .bcard .bd{font-size:11.5px;color:var(--sub);margin-top:5px}
  /* タイムライン（ガント） */
  .gwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .grid-g{min-width:max-content}
  .grow{display:flex;align-items:stretch;border-top:1px solid var(--line);min-height:34px}
  .grow:first-child{border-top:none}
  .gname{position:sticky;left:0;z-index:2;width:250px;flex:none;background:var(--panel);border-right:1px solid var(--line);
    padding:7px 10px;font-size:12.5px;display:flex;align-items:center;gap:0;overflow:hidden;white-space:nowrap}
  .gnttl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .gnasg{margin-left:auto;padding-left:8px;flex:none;font-size:11px;font-weight:700;color:var(--accent);max-width:96px;overflow:hidden;text-overflow:ellipsis}
  .gaddbtn{margin-left:auto;flex:none;border:1px solid var(--line);background:var(--panel);color:var(--accent);border-radius:6px;width:22px;height:22px;font-size:13px;font-weight:800;cursor:pointer;line-height:1}
  .gaddbtn:hover{background:var(--accent-soft)}
  .gcells{position:relative;flex:none}
  .ghead .gname{background:var(--accent-soft);font-weight:800;z-index:3}
  .ghead{background:var(--accent-soft)}
  .gday{width:30px;flex:none;text-align:center;font-size:9.5px;color:var(--sub);padding:4px 0;line-height:1.25;border-left:1px solid var(--line)}
  .gday.we{background:rgba(0,0,0,.03)}.gday.td{background:#FDECEC;color:var(--bad);font-weight:700}
  [data-theme="dark"] .gday.we{background:rgba(255,255,255,.04)}
  .gproj .gname{font-weight:800;background:var(--bg)}
  .gproj .gcells{background:var(--bg)}
  .gbar{position:absolute;top:6px;height:21px;border-radius:6px;display:flex;align-items:center;color:#fff;font-size:10.5px;
    font-weight:700;padding:0 8px;overflow:hidden;white-space:nowrap;cursor:pointer;z-index:1}
  .gbar.s-未着手{background:#9AA0A6}.gbar.s-進行{background:var(--accent)}.gbar.s-完了{background:var(--good)}.gbar.s-保留{background:var(--warn)}
  .gtoday{position:absolute;top:0;bottom:0;width:2px;background:var(--bad);opacity:.6;z-index:2}
  .gfill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.32);border-right:1px solid rgba(255,255,255,.55)}
  .gpspan{position:absolute;top:13px;height:7px;border-radius:4px;background:var(--accent);opacity:.18;z-index:0}
  .gdead{position:absolute;top:2px;transform:translateX(-50%);color:var(--bad);font-size:13px;line-height:1;z-index:2;pointer-events:none}
  .gnmeta{flex:none;margin-left:auto;padding-left:8px;font-size:10.5px;font-weight:800;color:var(--bad);white-space:nowrap}
  .gproj .gaddbtn{margin-left:8px}
  .gasg{margin-left:6px;opacity:.85;font-weight:600}
  /* タスク状態の色分け（リスト） */
  .stpill{display:inline-block;font-size:10.5px;font-weight:800;padding:1px 8px;border-radius:20px;margin-right:6px;color:#fff;vertical-align:middle}
  .stpill.st-未着手{background:#9AA0A6}.stpill.st-進行{background:var(--accent)}.stpill.st-完了{background:var(--good)}.stpill.st-保留{background:var(--warn)}
  .trow.s-row-完了{opacity:.72}
  .trow.s-row-進行 td.l:nth-child(2){font-weight:600}
  .vlegend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--sub);margin:0 0 10px}
  .vlegend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
  /* タスク詳細モーダル */
  .tasklink{color:var(--accent);cursor:pointer;font-weight:600}
  .tasklink:hover{text-decoration:underline}
  .modal.wide{width:600px}
  .tm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tm-grid .field{margin:0}
  .sub-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line)}
  .sub-line:first-child{border-top:none}
  .sub-line .st{flex:1;min-width:0}
  .modal-b.scroll{max-height:calc(90vh - 120px);overflow:auto}
  /* master-detail */
  .md{display:grid;grid-template-columns:minmax(420px,1.1fr) minmax(360px,1fr);gap:16px;align-items:start}
  .md .list-card{max-height:calc(100dvh - 150px);overflow:auto}
  .md .detail-card{max-height:calc(100dvh - 150px);overflow:auto}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .input{width:auto;min-width:200px}
  .mfilt{position:relative;display:inline-block}
  .mfilt>.mbtn{display:flex;align-items:center;gap:8px;min-width:160px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:14px;color:var(--ink);cursor:pointer;font-family:inherit;text-align:left}
  .mfilt>.mbtn .car{margin-left:auto;opacity:.55;font-size:11px}
  .mfilt.open>.mpop{display:block}
  .mpop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:45;min-width:210px;max-height:300px;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.28);padding:6px}
  .mpop label{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;font-size:13.5px;cursor:pointer;white-space:nowrap}
  .mpop label:hover{background:var(--accent-soft)}
  .mpop label.me{font-weight:800}
  .mpop .sep{height:1px;background:var(--line);margin:4px 2px}
  .mpop input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex:none}
  .search{flex:1;min-width:220px}
  /* detail内 */
  .dh{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
  .dh .nm{font-size:18px;font-weight:800}
  .drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .drow .k{color:var(--sub)}
  .seclabel{font-size:11px;letter-spacing:1px;color:var(--sub);font-weight:700;text-transform:uppercase;margin:18px 0 8px}
  .ln{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .ln:last-child{border-bottom:none}
  .ln .a{margin-left:auto;font-weight:700}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(10,14,20,.45);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border-radius:14px;width:440px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal-h{padding:16px 18px;border-bottom:1px solid var(--line);font-weight:800;font-size:15px}
  .modal-b{padding:18px}
  .modal-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  /* login */
  .login-screen{height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 40px rgba(16,24,40,.1);padding:30px;width:380px;max-width:92vw}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 18px;color:var(--sub);font-size:13.5px}
  .login-card .field{margin-bottom:11px}
  .login-msg{color:var(--bad);font-size:13px;min-height:18px;margin-top:8px}
  .link{color:var(--accent);cursor:pointer;font-size:12.5px}
  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:#111418;color:#fff;
    padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:80;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .switch{font-size:12px;color:var(--sub)}
  .switch a{color:var(--accent)}
  .pwbox{display:flex;gap:8px}
  .pwbox .input{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .role-tag{font-size:11.5px;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
  .impbar{display:none;margin:14px 28px 0;padding:10px 12px;border:2px solid #111;background:#fff;color:#111;align-items:center;gap:10px;font-size:13px;font-weight:800}
  .impbar.show{display:flex}
  .impbar .sub{font-weight:600;color:#555}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login" class="login-screen hidden">
  <div class="login-card">
    <h1>オフィスキャンプ</h1>
    <p>案件・経費・予定の管理（PC版）</p>
    <div class="field"><label class="fl">メール</label><input id="lEmail" class="input" type="email" autocomplete="username" placeholder="you@officecamp.jp"></div>
    <div class="field"><label class="fl">パスワード</label><input id="lPass" class="input" type="password" autocomplete="current-password" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" style="width:100%" onclick="doLogin()">ログイン</button>
    <div class="login-msg" id="lMsg"></div>
    <div style="text-align:center;margin-top:6px"><span class="link" onclick="magic()">初回ログイン・パスワードを忘れた方</span></div>
    <div style="text-align:center;margin-top:14px" class="switch">スマホで使う場合は <a href="app.html">スマホ版</a></div>
  </div>
</div>

<!-- アプリ -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="brand"><span class="logo">⛺</span> OFFICE CAMP</div>
    <nav class="nav" id="nav">
      <a data-v="home"     onclick="go('home')"><span class="ic">▦</span> ホーム</a>
      <a data-v="projects" onclick="go('projects')"><span class="ic">▤</span> 案件</a>
      <a data-v="expenses" onclick="go('expenses')"><span class="ic">¥</span> 経費</a>
      <div class="navsec">管理</div>
      <a data-v="finance" id="financeNav" class="hidden" onclick="go('finance')"><span class="ic">▣</span> 経理</a>
      <a data-v="tasks"    onclick="go('tasks')"><span class="ic">☷</span> タスク</a>
      <a data-v="orders"   onclick="go('orders')"><span class="ic">⇄</span> 発注</a>
      <a data-v="members" id="membersNav" class="hidden" onclick="go('members')"><span class="ic">👥</span> メンバー</a>
    </nav>
    <div class="side-foot">
      <div class="me"><b id="meName">—</b><span id="meRole">—</span></div>
      <a class="nav" style="display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-size:13px" onclick="toggleTheme()"><span class="ic">◐</span> テーマ切替</a>
      <a class="nav" style="display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-size:13px" onclick="openPwModal()"><span class="ic">🔑</span> パスワード</a>
      <a class="nav" style="display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--side-ink);cursor:pointer;font-size:13px" onclick="doLogout()"><span class="ic">⏻</span> ログアウト</a>
    </div>
  </aside>
  <main class="main">
    <header class="top">
      <h1 id="pageTitle">ホーム</h1>
      <div class="spacer"></div>
      <div id="topActions"></div>
    </header>
    <div id="impersonationBar" class="impbar"></div>
    <div class="content"><div class="maxw" id="content"></div></div>
  </main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js?v=14"></script>
<script>
let curView='home', curProject=null, projSort={key:'profit',dir:-1};

// ---- 共通UI ----
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function applyTheme(){let t=null;try{t=localStorage.getItem('oc_theme');}catch(e){}if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.dataset.theme=t;}
function toggleTheme(){const c=document.documentElement.dataset.theme==='dark'?'dark':'light';const n=c==='dark'?'light':'dark';document.documentElement.dataset.theme=n;try{localStorage.setItem('oc_theme',n);}catch(e){}}
function modal(html){document.getElementById('modalRoot').innerHTML='<div class="ov" onclick="if(event.target===this)closeModal()">'+html+'</div>';}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

// ---- 認証 ----
async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const password=document.getElementById('lPass').value;
  const msg=document.getElementById('lMsg');
  if(!email||!password){msg.textContent='メールとパスワードを入力してください。';return;}
  msg.textContent='ログイン中…';
  const {error}=await OC.signIn(email,password);
  if(error)msg.textContent=(error.message==='Invalid login credentials')?'メールかパスワードが違います':('ログインできません: '+error.message);
}
async function magic(){
  const email=document.getElementById('lEmail').value.trim();
  const msg=document.getElementById('lMsg');
  if(!email){msg.textContent='メールを入力してください。';return;}
  const {error}=await OC.sendMagic(email);
  msg.style.color='var(--sub)';
  msg.textContent=error?('エラー: '+error.message):'メールのリンクから入って、左下「パスワード」で設定してください。';
}
async function doLogout(){await OC.signOut();location.reload();}
function openPwModal(){
  modal('<div class="modal"><div class="modal-h">パスワードを設定 / 変更</div>'+
    '<div class="modal-b"><div class="field"><label class="fl">新しいパスワード（6文字以上）</label>'+
    '<input id="pwNew" class="input" type="password" autocomplete="new-password"></div></div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button>'+
    '<button class="btn" onclick="savePw()">設定</button></div></div>');
}
async function savePw(){
  const p=document.getElementById('pwNew').value;
  if(!p||p.length<6){toast('6文字以上で入力してください');return;}
  const {error}=await OC.setPassword(p);
  if(error){toast('エラー: '+error.message);return;}
  closeModal();toast('パスワードを設定しました');
}

// ---- ルーティング ----
const TITLES={home:'ホーム',projects:'案件',expenses:'経費',finance:'経理',tasks:'タスク',orders:'発注',members:'メンバー'};
function go(v){
  if(v==='finance' && !OC.isAccounting()){
    toast('経理ユーザーのみ閲覧できます');
    v='projects';
  }
  if(v==='members' && (!OC.isActualAdmin() || OC.impersonatingUser)){
    toast('管理者のみ利用できます');
    v='home';
  }
  curView=v;
  document.querySelectorAll('#nav a[data-v]').forEach(a=>a.classList.toggle('on',a.dataset.v===v));
  document.getElementById('pageTitle').textContent=TITLES[v]||'';
  document.getElementById('topActions').innerHTML='';
  const c=document.getElementById('content');
  if(v==='home')return renderHome(c);
  if(v==='projects')return renderProjects(c);
  if(v==='expenses')return renderExpenses(c);
  if(v==='finance')return renderFinance(c);
  if(v==='tasks')return renderTasks(c);
  if(v==='orders')return renderOrders(c);
  if(v==='members')return renderMembers(c);
}
function updateImpersonationBar(){
  const bar=document.getElementById('impersonationBar');
  if(!bar)return;
  if(!OC.impersonatingUser){
    bar.classList.remove('show');
    bar.innerHTML='';
    return;
  }
  const u=OC.impersonatingUser;
  bar.innerHTML=`<span>管理者として ${esc(u.name||u.email)} を代理操作中</span>
    <span class="sub">表示・作成主体は代理先ユーザー基準です</span>
    <span style="margin-left:auto"></span>
    <button class="btn ghost sm" onclick="stopImpersonation()">代理操作を終了</button>`;
  bar.classList.add('show');
}
function refreshShell(){
  document.getElementById('meName').textContent=OC.meName||'—';
  document.getElementById('meRole').textContent=OC.myRole||'—';
  document.getElementById('financeNav').classList.toggle('hidden',!OC.isAccounting());
  document.getElementById('membersNav').classList.toggle('hidden',!OC.isActualAdmin()||!!OC.impersonatingUser);
  updateImpersonationBar();
}
function startImpersonation(userId){
  const p=OC.peopleById[userId]||{};
  const label=p.name||p.email||'このID';
  if(!confirm(label+' を代理操作します。管理者セッションのまま、画面と作成主体をこのユーザー基準に切り替えます。'))return;
  try{
    OC.startImpersonation(userId);
    OC.resetScope();
    curProject=null;               // 代理切替で案件詳細ペインの残留を消す（権限外の財務が残る事故防止）
    toast(label+' を代理操作中');
    refreshShell();
    go('home');
  }catch(e){toast('代理操作エラー: '+e.message);}
}
function stopImpersonation(){
  OC.stopImpersonation();
  OC.resetScope();
  curProject=null;                 // 代理終了でも選択案件を破棄（対象基準の残留を消す）
  toast('代理操作を終了しました');
  refreshShell();
  go('home');
}

// ---- ホーム（ダッシュボード） ----
async function renderHome(c){
  c.innerHTML='<div class="empty">読み込み中…</div>';
  const ps=OC.projects.length?OC.projects:await OC.loadProjects();
  const active=ps.filter(p=>p.status==='進行');
  const rev=ps.reduce((s,p)=>s+(p.revenue||0),0);
  const prof=ps.reduce((s,p)=>s+(p.profit||0),0);
  const exps=await OC.loadExpenses(8);
  const top=[...ps].sort((a,b)=>(b.profit||0)-(a.profit||0)).slice(0,6);
  c.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">案件数</div><div class="n">${ps.length}</div><div class="s">進行中 ${active.length}</div></div>
      <div class="kpi"><div class="l">受注合計</div><div class="n">${OC.yen(rev)}</div></div>
      <div class="kpi"><div class="l">粗利合計</div><div class="n">${OC.yen(prof)}</div><div class="s">粗利率 ${rev?Math.round(prof/rev*100):0}%</div></div>
      ${OC.isManager()?`<div class="kpi"><div class="l">登録メンバー</div><div class="n">${OC.people.length}</div></div>`:`<div class="kpi"><div class="l">進行中の案件</div><div class="n">${active.length}</div></div>`}
    </div>
    <div class="grid2">
      <div class="card"><div class="card-h">粗利トップ案件</div><div class="card-b" style="padding:0">
        <table class="tbl"><tbody>${top.map(p=>`<tr onclick="go('projects');setTimeout(()=>selectProject('${p.id}'),50)">
          <td class="l"><b>${p.code?'<span class="code">'+esc(p.code)+'</span> ':''}${esc(p.name)}</b></td>
          <td>${OC.yen(p.revenue)}</td><td class="${(p.profit||0)<0?'neg':'pos'}">${OC.yen(p.profit)}</td>
          <td><span class="pill"><i class="dot s-${p.status}"></i>${esc(p.status||'')}</span></td></tr>`).join('')||'<tr><td class="empty">案件がありません</td></tr>'}</tbody></table>
      </div></div>
      <div class="card"><div class="card-h">最近の経費</div><div class="card-b" style="padding:0">
        ${exps.length?exps.map(e=>`<div class="ln" style="padding:11px 16px;border-bottom:1px solid var(--line)">
          <div><div><b>${esc(e.note||'（メモなし）')}</b></div>
          <div class="muted" style="font-size:12px">${esc(e.proj?.name||'—')}・${OC.fmtDate(e.spent_at)}・${esc(e.author?.name||e.author?.email||'—')}</div></div>
          <div class="a">${OC.yen(e.amount)}</div></div>`).join(''):'<div class="empty">経費はまだありません</div>'}
      </div></div>
    </div>`;
}

// ---- 案件（master-detail） ----
function projActions(){
  document.getElementById('topActions').innerHTML='<button class="btn" onclick="openProjModal()">＋ 案件を追加</button>';
}
async function renderProjects(c){
  projActions();
  c.innerHTML='<div class="empty">読み込み中…</div>';
  if(!OC.projects.length)await OC.loadProjects();
  c.innerHTML=`
    <div class="toolbar">
      <input id="pSearch" class="input search" placeholder="🔍 案件名・番号・受注元" oninput="paintProjTable()">
      <select id="pStatus" class="input" onchange="paintProjTable()">
        <option value="">状態：すべて</option><option>見込</option><option>進行</option><option>完了</option><option>失注</option>
      </select>
    </div>
    <div class="md">
      <div class="card list-card"><div id="projTable"></div></div>
      <div class="card detail-card"><div class="card-b" id="projDetail"><div class="empty">← 左の一覧から案件を選んでください</div></div></div>
    </div>`;
  paintProjTable();
  if(curProject)selectProject(curProject);
}
function projFiltered(){
  const q=(document.getElementById('pSearch')?.value||'').trim().toLowerCase();
  const st=document.getElementById('pStatus')?.value||'';
  return OC.projects.filter(p=>{
    if(st&&p.status!==st)return false;
    if(q&&!`${p.code||''} ${p.name||''} ${p.client||''}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function sortProj(key){if(projSort.key===key)projSort.dir*=-1;else projSort={key,dir:(key==='name'||key==='status')?1:-1};paintProjTable();}
function paintProjTable(){
  const rows=projFiltered();const {key,dir}=projSort;
  rows.sort((a,b)=>{let x=a[key],y=b[key];if(key==='name'){x=(a.code||'')+(a.name||'');y=(b.code||'')+(b.name||'');}
    if(typeof x==='string'||typeof y==='string')return String(x||'').localeCompare(String(y||''),'ja')*dir;return((x||0)-(y||0))*dir;});
  const ar=k=>projSort.key===k?(projSort.dir<0?' ▾':' ▴'):'';
  document.getElementById('projTable').innerHTML=
    `<table class="tbl"><thead><tr>
      <th class="l" onclick="sortProj('name')">案件${ar('name')}</th>
      <th onclick="sortProj('revenue')">受注${ar('revenue')}</th>
      <th onclick="sortProj('profit')">粗利${ar('profit')}</th>
      <th onclick="sortProj('profit_rate')">粗利率${ar('profit_rate')}</th>
      <th class="l" onclick="sortProj('status')">状態${ar('status')}</th>
    </tr></thead><tbody>${rows.map(p=>`<tr data-pid="${p.id}" onclick="selectProject('${p.id}')">
      <td class="l"><b>${p.code?'<span class="code">'+esc(p.code)+'</span> ':''}${esc(p.name)}</b>${p.client?'<div class="muted" style="font-size:11.5px">'+esc(p.client)+'</div>':''}</td>
      <td>${OC.yen(p.revenue)}</td>
      <td class="${(p.profit||0)<0?'neg':''}">${OC.yen(p.profit)}</td>
      <td>${p.profit_rate}%</td>
      <td class="l"><span class="pill"><i class="dot s-${p.status}"></i>${esc(p.status||'')}</span></td>
    </tr>`).join('')||'<tr><td class="empty">該当する案件がありません</td></tr>'}</tbody></table>`;
  if(curProject)document.querySelectorAll('#projTable tr[data-pid]').forEach(tr=>tr.classList.toggle('sel',tr.dataset.pid===curProject));
  // 選択中の案件が検索/状態フィルタで一覧から消えたら、右の詳細ペインの残留も消す
  if(curProject&&!rows.some(p=>p.id===curProject)){
    curProject=null;
    const box=document.getElementById('projDetail');
    if(box)box.innerHTML='<div class="empty">← 左の一覧から案件を選んでください</div>';
  }
}
async function selectProject(id){
  curProject=id;
  document.querySelectorAll('#projTable tr[data-pid]').forEach(tr=>tr.classList.toggle('sel',tr.dataset.pid===id));
  const box=document.getElementById('projDetail');
  if(!box)return;
  box.innerHTML='<div class="empty">読み込み中…</div>';
  const {p,expenses,orders,members,tasks}=await OC.loadProjectDetail(id);
  const leader=p.leader_id?OC.personName(p.leader_id):'—';
  box.innerHTML=`
    <div class="dh"><div><div class="nm">${p.code?'<span class="code">'+esc(p.code)+'</span> ':''}${esc(p.name||'—')}</div>
      <div class="muted" style="margin-top:4px"><span class="pill"><i class="dot s-${p.status}"></i>${esc(p.status||'')}</span></div></div>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="openTaskAddModal('${id}')">＋ タスク</button>
        <button class="btn ghost sm" onclick="openOrderModal('${id}')">＋ 発注</button>
        <button class="btn ghost sm" onclick="openExpModal('${id}')">＋ 経費</button></div></div>
    <div class="kpis" style="grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 4px">
      <div class="kpi"><div class="l">受注</div><div class="n" style="font-size:20px">${OC.yen(p.revenue)}</div></div>
      <div class="kpi"><div class="l">原価</div><div class="n" style="font-size:20px">${OC.yen(p.cost)}</div></div>
      <div class="kpi"><div class="l">粗利</div><div class="n ${(p.profit||0)<0?'neg':''}" style="font-size:20px">${OC.yen(p.profit)}</div></div>
      <div class="kpi"><div class="l">粗利率</div><div class="n" style="font-size:20px">${p.profit_rate}%</div></div>
    </div>
    <div class="seclabel">案件情報（その場で編集）</div>
    <div class="drow"><span class="k">状態</span><select class="einput" onchange="saveProjField('${id}','status',this.value)">${pstatusOptions(p.status)}</select></div>
    <div class="drow"><span class="k">受注金額</span><input class="einput" type="number" value="${p.revenue||0}" onchange="saveProjField('${id}','amount',this.value)"></div>
    <div class="drow"><span class="k">受注元</span><input class="einput" value="${esc(p.client||'')}" placeholder="—" onchange="saveProjField('${id}','client',this.value)"></div>
    <div class="drow"><span class="k">担当（リーダー）</span><select class="einput" onchange="saveProjField('${id}','leader_id',this.value)">${leaderOptions(p.leader_id)}</select></div>
    <div class="drow"><span class="k">開始日</span><input class="einput" type="date" value="${p.start_date||''}" onchange="saveProjField('${id}','start_date',this.value)"></div>
    <div class="drow"><span class="k">納品日</span><input class="einput" type="date" value="${p.delivery_date||''}" onchange="saveProjField('${id}','delivery_date',this.value)"></div>
    <div class="drow"><span class="k">メンバー<div class="muted" style="font-size:10.5px;font-weight:400">案件の全タスクを見られる</div></span>
      <span>${(()=>{const ids=members.map(m=>m.user_id);
        const canEdit=OC.isManager();
        const chips=ids.length?ids.map(uid=>`<span class="achip">${esc(OC.personName(uid))}${canEdit?`<span style="cursor:pointer;margin-left:2px" onclick="removeMember('${id}','${uid}')">×</span>`:''}</span>`).join(' '):'<span class="muted">—</span>';
        if(!canEdit)return chips;
        const opts=OC.people.filter(pp=>!ids.includes(pp.id)).map(pp=>`<option value="${pp.id}">${esc(pp.name||pp.email)}</option>`).join('');
        return chips+` <select class="einput" style="max-width:150px;margin-left:4px" onchange="addMemberPick('${id}',this)"><option value="">＋メンバー追加</option>${opts}</select>`;
      })()}</span></div>
    <div class="seclabel" style="display:flex;align-items:center">経費（${expenses.length}）<button class="btn ghost" style="margin-left:auto;padding:3px 11px;font-size:11.5px" onclick="openExpModal('${id}')">＋ 経費</button></div>
    ${expenses.length?expenses.map(e=>`<div class="ln"><div><b>${esc(e.note||'（メモなし）')}</b>
      <div class="muted" style="font-size:12px">${OC.fmtDate(e.spent_at)}・${esc(e.author?.name||e.author?.email||'—')}${e.kind==='外注'&&e.vendor?'・外注 '+esc(e.vendor.name):''}</div></div>
      <div class="a">${OC.yen(e.amount)} <span class="muted" style="font-size:11px">${esc(e.status||'')}</span></div></div>`).join(''):'<div class="muted" style="font-size:13px;padding:6px 0">経費はまだありません</div>'}
    <div class="seclabel" style="display:flex;align-items:center">タスク（${(tasks||[]).filter(t=>!t.parent_task_id).length}）<button class="btn ghost" style="margin-left:auto;padding:3px 11px;font-size:11.5px" onclick="openTaskAddModal('${id}')">＋ タスク</button></div>
    ${(()=>{const tops=(tasks||[]).filter(t=>!t.parent_task_id);
      const line=(t,sub)=>`<div class="ln" style="${sub?'padding-left:22px;border-top:1px dashed var(--line)':''}"><div>
        <span class="tasklink" onclick="openTaskModal('${t.id}')">${sub?'<span class="muted">↳ </span>':''}${esc(t.title)}</span>
        <div class="muted" style="font-size:12px"><span class="pill" style="background:transparent;padding:0"><i class="dot s-${t.status||'未着手'}"></i>${esc(t.status||'未着手')}</span>　${t.start_date?OC.fmtDate(t.start_date):'—'} → ${t.end_date?OC.fmtDate(t.end_date):'—'}</div></div>
        <div class="a" style="font-weight:400">${(t.task_assignees||[]).map(a=>'<span class="achip">'+esc(OC.personName(a.user_id))+'</span>').join(' ')}</div></div>`;
      return tops.map(t=>line(t,false)+(tasks||[]).filter(s=>s.parent_task_id===t.id).map(s=>line(s,true)).join('')).join('')||'<div class="muted" style="font-size:13px;padding:6px 0">タスクはありません</div>';})()}
    <div class="seclabel" style="display:flex;align-items:center">発注（${orders.length}）<button class="btn ghost" style="margin-left:auto;padding:3px 11px;font-size:11.5px" onclick="openOrderModal('${id}')">＋ 発注</button></div>
    ${orders.length?orders.map(o=>`<div class="ln"><div><b>${esc(o.title)}</b> <span class="pill">${esc(o.kind)}</span>
      <div class="muted" style="font-size:12px">宛先 ${o.kind==='外注'?esc(o.vendor?.name||'外注先'):esc(OC.deptName(o.to_dept_id)+(o.to_user_id?'・'+OC.personName(o.to_user_id):''))}・${esc(o.status||'')}</div></div>
      <div class="a">${OC.yen(o.amount)}</div></div>`).join(''):'<div class="muted" style="font-size:13px;padding:6px 0">発注はまだありません</div>'}
  `;
}
const PSTATUS=['見込','進行','完了','失注'];
function pstatusOptions(cur){return PSTATUS.map(s=>`<option ${s===cur?'selected':''}>${s}</option>`).join('');}
function leaderOptions(cur){return '<option value="">—</option>'+OC.people.map(p=>`<option value="${p.id}" ${p.id===cur?'selected':''}>${esc(p.name||p.email)}</option>`).join('');}
async function saveProjField(id,field,value){
  let v=value;
  if(field==='amount')v=parseInt(String(value).replace(/[,，]/g,''),10)||0;
  if(field==='amount'&&v<0){toast('金額は0以上で入力してください');await OC.loadProjects();if(curView==='projects')selectProject(id);return;}
  if((field==='start_date'||field==='delivery_date')&&value&&!saneDate(value)){toast('日付の年を確認してください（2000〜2100）');if(curView==='projects')selectProject(id);return;}
  if((field==='client'||field==='start_date'||field==='delivery_date'||field==='leader_id')&&v==='')v=null;
  const patch={};patch[field]=v;
  const {error}=await OC.updateProject(id,patch);
  if(error){toast('保存エラー: '+error.message);return;}
  toast('保存しました');
  await OC.loadProjects();
  if(curView==='finance')paintFinance();
  if(curView==='projects'){paintProjTable();selectProject(id);}
}
function openProjModal(){
  const opts=OC.projOpts.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const effectiveId=OC.effectiveUserId();
  const leaderField=OC.isManager()?`<div class="field"><label class="fl">案件リーダー</label><select id="mLeader" class="input">${OC.people.map(p=>`<option value="${p.id}" ${p.id===effectiveId?'selected':''}>${esc(p.name||p.email)}</option>`).join('')}</select></div>`:'';
  modal(`<div class="modal"><div class="modal-h">案件を追加</div><div class="modal-b">
    <div class="field"><label class="fl">案件名</label><input id="mName" class="input" placeholder="○○ビル改修"></div>
    <div class="field"><label class="fl">受注元（任意）</label><input id="mClient" class="input" placeholder="◇◇建設"></div>
    <div class="field"><label class="fl">受注金額（円・任意）</label><input id="mAmt" class="input" inputmode="numeric" placeholder="0"></div>
    <div style="display:flex;gap:10px"><div class="field" style="flex:1"><label class="fl">開始日</label><input id="mStart" class="input" type="date"></div>
      <div class="field" style="flex:1"><label class="fl">納品日</label><input id="mDeliv" class="input" type="date"></div></div>
    <div class="field"><label class="fl">派生元の案件（任意）</label><select id="mParent" class="input"><option value="">新規（派生元なし）</option>${opts}</select></div>
    ${leaderField}
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="mSave" onclick="saveProj()">追加</button></div></div>`);
}
async function saveProj(){
  const name=document.getElementById('mName').value.trim();
  if(!name){toast('案件名を入れてください');return;}
  const amount=parseInt((document.getElementById('mAmt').value||'0').replace(/[,，]/g,''),10)||0;
  if(amount<0){toast('受注金額は0以上で入力してください');return;}
  const _s=document.getElementById('mStart').value,_d=document.getElementById('mDeliv').value;
  if(!saneDate(_s)||!saneDate(_d)){toast('日付の年を確認してください（2000〜2100）');return;}
  if(badRange(_s,_d)){toast('納品日は開始日以降にしてください');return;}
  const payload={name,client:document.getElementById('mClient').value.trim()||null,amount,
    start_date:document.getElementById('mStart').value||null,delivery_date:document.getElementById('mDeliv').value||null,
    parent_id:document.getElementById('mParent').value||null,owner_id:OC.effectiveUserId(),
    leader_id:OC.isManager()?(document.getElementById('mLeader').value||OC.effectiveUserId()):OC.effectiveUserId(),status:'進行'};
  document.getElementById('mSave').disabled=true;
  const {error}=await OC.addProject(payload);
  if(error){toast('追加エラー: '+error.message);document.getElementById('mSave').disabled=false;return;}
  closeModal();toast('案件「'+name+'」を追加');
  await OC.loadProjects();await OC.projectOptions();
  if(curView==='projects')paintProjTable();
}

// ---- 経費 ----
let expCache=[];
function expActions(){document.getElementById('topActions').innerHTML='<button class="btn" onclick="openExpModal()">＋ 新規経費</button>';}
let expGroupMode='proj'; // 'proj' | 'flat'
async function renderExpenses(c){
  expActions();
  c.innerHTML='<div class="empty">読み込み中…</div>';
  expCache=await OC.loadExpenses(500);
  const total=expCache.reduce((s,e)=>s+(e.amount||0),0);
  const capped=expCache.length>=500;   // 500件上限に達したら合計は過少（全社の正はp/l=経理タブ）
  const bar=`<div class="toolbar">
    <div class="muted">合計 <b style="color:var(--ink);font-size:15px">${OC.yen(total)}</b>・${expCache.length}件${capped?'<span style="color:#c0392b">（表示は直近500件・全件合計は経理タブ参照）</span>':''}</div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn ghost sm" id="egProj" onclick="setExpMode('proj')">案件ごと</button>
    <button class="btn ghost sm" id="egFlat" onclick="setExpMode('flat')">一覧</button>
  </div>`;
  c.innerHTML=bar+'<div id="expBody"></div>';

function setExpMode(m){expGroupMode=m;paintExpenses();}
function expRowsHTML(list){
  return list.map(e=>`<tr style="cursor:default">
    <td class="l">${OC.fmtDate(e.spent_at)}</td>
    <td class="l">${esc(e.note||'（メモなし）')}${e.kind==='外注'&&e.vendor?' <span class="pill">外注'+esc(e.vendor.name)+'</span>':''}</td>
    <td class="l">${esc(e.author?.name||e.author?.email||'—')}</td>
    <td><b>${OC.yen(e.amount)}</b></td>
    <td class="l"><span class="stbadge" style="background:var(--accent-soft);color:var(--accent)">${esc(e.status||'')}</span></td>

function paintExpenses(){
  document.getElementById('egProj').classList.toggle('on',expGroupMode==='proj');
  document.getElementById('egFlat').classList.toggle('on',expGroupMode==='flat');
  const body=document.getElementById('expBody');
  if(!expCache.length){body.innerHTML='<div class="card"><div class="card-b empty">経費はまだありません</div></div>';return;}
  if(expGroupMode==='flat'){
    body.innerHTML=`<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr>
      <th class="l">日付</th><th class="l">案件 / メモ</th><th class="l">入力者</th><th>金額</th><th class="l">状態</th>
    </tr></thead><tbody>${expCache.map(e=>`<tr style="cursor:default">
      <td class="l">${OC.fmtDate(e.spent_at)}</td>
      <td class="l">${e.proj?.code?'<span class="code">'+esc(e.proj.code)+'</span> ':''}${esc(e.proj?.name||'—')}<div class="muted" style="font-size:12px">${esc(e.note||'（メモなし）')}</div></td>
      <td class="l">${esc(e.author?.name||e.author?.email||'—')}</td>
      <td><b>${OC.yen(e.amount)}</b></td>
      <td class="l"><span class="stbadge" style="background:var(--accent-soft);color:var(--accent)">${esc(e.status||'')}</span></td>
    </tr>`).join('')}</tbody></table></div></div>`;
    return;
  }
  // 案件ごと
  const groups={};
  expCache.forEach(e=>{const k=e.project_id||'_none';(groups[k]=groups[k]||{proj:e.proj,items:[]}).items.push(e);});
  const arr=Object.values(groups).map(g=>({...g,total:g.items.reduce((s,e)=>s+(e.amount||0),0)}))
    .sort((a,b)=>b.total-a.total);
  body.innerHTML=arr.map(g=>`<div class="card" style="margin-bottom:16px">
    <div class="card-h">${g.proj?.code?'<span class="code">'+esc(g.proj.code)+'</span> ':''}${esc(g.proj?.name||'案件なし')}
      <span class="muted" style="margin-left:auto;font-weight:700">${g.items.length}件・<span style="color:var(--ink)">${OC.yen(g.total)}</span></span></div>
    <div class="card-b" style="padding:0"><table class="tbl"><thead><tr>
      <th class="l">日付</th><th class="l">メモ</th><th class="l">入力者</th><th>金額</th><th class="l">状態</th>
    </tr></thead><tbody>${expRowsHTML(g.items)}</tbody></table></div></div>`).join('');
}

async function saveNewTask(pid){
  const v=x=>document.getElementById(x).value;
  const project_id=pid||v('ntProj')||null;
  const title=v('ntTitle').trim();if(!title){toast('タイトルを入れてください');return;}
  if(!project_id){toast('案件を選んでください');return;}
  if(!saneDate(v('ntStart'))||!saneDate(v('ntEnd'))){toast('日付の年を確認してください（2000〜2100）');return;}
  if(badRange(v('ntStart'),v('ntEnd'))){toast('終了日は開始日以降にしてください');return;}
  const {data,error}=await OC.addTask({project_id,title,status:v('ntStatus'),start_date:v('ntStart')||null,end_date:v('ntEnd')||null});
  if(error){toast('追加エラー: '+error.message);return;}
  const asgSel=document.getElementById('ntAsg');
  const asg=asgSel?[...asgSel.selectedOptions].map(o=>o.value):[];
  for(const uid of asg){ const r=await OC.assignTask(data.id,uid); if(r.error){toast('担当割当エラー: '+r.error.message);} }
  closeModal();toast('タスクを追加'+(asg.length?'（担当'+asg.length+'名）':''));
  try{tasksCache=await OC.loadAllTasks();}catch(e){}
  if(curView==='tasks')paintTasks();
  if(curView==='projects'&&curProject)selectProject(curProject);
}
function openExpModal(projectId){
  const opts=OC.projOpts.map(p=>`<option value="${p.id}" ${p.id===projectId?'selected':''}>${esc(p.name)}</option>`).join('');
  modal(`<div class="modal"><div class="modal-h">経費を記録</div><div class="modal-b">
    <div class="field"><label class="fl">金額（円）</label><input id="eAmt" class="input" inputmode="numeric" placeholder="0" autofocus></div>
    <div class="field"><label class="fl">紐づく案件</label><select id="eProj" class="input">${opts}</select></div>
    <div class="field"><label class="fl">メモ（何を買ったか）</label><input id="eMemo" class="input" placeholder="木材・ビス など"></div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="eSave" onclick="saveExp()">記録する</button></div></div>`);

async function saveExp(){
  const amount=parseInt((document.getElementById('eAmt').value||'0').replace(/[,，]/g,''),10)||0;
  const project_id=document.getElementById('eProj').value;
  const note=document.getElementById('eMemo').value.trim();
  if(!(amount>0)||!project_id){toast('金額（正の数）と案件を入れてください');return;}
  document.getElementById('eSave').disabled=true;
  const {error}=await OC.addExpense(project_id,amount,note);
  if(error){toast('記録エラー: '+error.message);document.getElementById('eSave').disabled=false;return;}
  closeModal();toast(OC.yen(amount)+' を記録しました');
  if(curView==='expenses')renderExpenses(document.getElementById('content'));
  if(curView==='projects'&&curProject)selectProject(curProject);
  if(curView==='home')renderHome(document.getElementById('content'));

let finSort={key:'profit',dir:-1};
function ym(d){return d?String(d).slice(0,7):'';}
async function renderFinance(c){
  if(!OC.isManager()){c.innerHTML='<div class="card"><div class="card-b empty">経理ユーザー（経理／管理者）のみ閲覧できます。</div></div>';return;}
  if(!OC.projects.length)await OC.loadProjects();
  const months=[...new Set(OC.projects.map(p=>ym(p.delivery_date)).filter(Boolean))].sort().reverse();
  const leaders=[...new Set(OC.projects.map(p=>p.leader_id).filter(Boolean))];
  c.innerHTML=`<div id="finKpis"></div>
    <div class="toolbar">
      <input id="fSearch" class="input search" placeholder="🔍 案件名・受注元" oninput="paintFinance()">
      <select id="fStatus" class="input" onchange="paintFinance()"><option value="">状態：すべて</option><option>見込</option><option>進行</option><option>完了</option><option>失注</option></select>
      <select id="fLeader" class="input" onchange="paintFinance()"><option value="">担当：すべて</option>${leaders.map(id=>`<option value="${id}">${esc(OC.personName(id))}</option>`).join('')}</select>
      <select id="fMonth" class="input" onchange="paintFinance()"><option value="">納品月：すべて</option>${months.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
      <button class="btn ghost" style="margin-left:auto" onclick="exportFinanceCSV()">⤓ CSV出力</button>
    </div>
    <div class="card"><div class="card-b" style="padding:0;overflow:auto" id="finTable"></div></div>`;
  paintFinance();
}
function finFiltered(){
  const q=(document.getElementById('fSearch')?.value||'').trim().toLowerCase();
  const st=document.getElementById('fStatus')?.value||'';
  const ld=document.getElementById('fLeader')?.value||'';
  const mo=document.getElementById('fMonth')?.value||'';
  return OC.projects.filter(p=>{
    if(st&&p.status!==st)return false;
    if(ld&&p.leader_id!==ld)return false;
    if(mo&&ym(p.delivery_date)!==mo)return false;
    if(q&&!`${p.code||''} ${p.name||''} ${p.client||''}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function sortFin(k){if(finSort.key===k)finSort.dir*=-1;else finSort={key:k,dir:(k==='name'||k==='status')?1:-1};paintFinance();}
function exportFinanceCSV(){
  const rows=finFiltered();
  const head=['番号','案件名','受注元','状態','担当','受注','原価','外注','粗利','粗利率(%)','納品日'];
  const q=s=>{s=String(s==null?'':s);return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const lines=[head.join(',')].concat(rows.map(p=>[p.code||'',p.name||'',p.client||'',p.status||'',
    p.leader_id?OC.personName(p.leader_id):'',p.revenue||0,p.cost||0,p.outsource||0,p.profit||0,p.profit_rate||0,p.delivery_date||''].map(q).join(',')));
  const csv='﻿'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='officecamp-keiri-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
  toast('CSVを書き出しました（'+rows.length+'件）');
}
function paintFinance(){
  const rows=finFiltered();const {key,dir}=finSort;
  rows.sort((a,b)=>{let x=a[key],y=b[key];if(key==='name'){x=(a.code||'')+(a.name||'');y=(b.code||'')+(b.name||'');}
    if(typeof x==='string'||typeof y==='string')return String(x||'').localeCompare(String(y||''),'ja')*dir;return((x||0)-(y||0))*dir;});
  const rev=rows.reduce((s,p)=>s+(p.revenue||0),0),cost=rows.reduce((s,p)=>s+(p.cost||0),0),prof=rows.reduce((s,p)=>s+(p.profit||0),0);
  document.getElementById('finKpis').innerHTML=`<div class="kpis">
    <div class="kpi"><div class="l">案件数</div><div class="n">${rows.length}</div></div>
    <div class="kpi"><div class="l">受注計</div><div class="n">${OC.yen(rev)}</div></div>
    <div class="kpi"><div class="l">原価計</div><div class="n">${OC.yen(cost)}</div></div>
    <div class="kpi"><div class="l">粗利計</div><div class="n ${prof<0?'neg':'pos'}">${OC.yen(prof)}</div><div class="s">粗利率 ${rev?Math.round(prof/rev*100):0}%</div></div>
  </div>`;
  const ar=k=>finSort.key===k?(finSort.dir<0?' ▾':' ▴'):'';
  document.getElementById('finTable').innerHTML=`<table class="tbl"><thead><tr>
    <th class="l" onclick="sortFin('name')">案件${ar('name')}</th>
    <th class="l" onclick="sortFin('status')">状態${ar('status')}</th>
    <th class="l">担当</th>
    <th onclick="sortFin('revenue')">受注${ar('revenue')}</th>
    <th onclick="sortFin('cost')">原価${ar('cost')}</th>
    <th onclick="sortFin('outsource')">外注${ar('outsource')}</th>
    <th onclick="sortFin('profit')">粗利${ar('profit')}</th>
    <th onclick="sortFin('profit_rate')" title="粗利率 ＝ 粗利 ÷ 受注">粗利率${ar('profit_rate')}</th>
    <th class="l">納品</th>
  </tr></thead><tbody>${rows.map(p=>`<tr style="cursor:default">
    <td class="l"><b><span class="link" onclick="go('projects');setTimeout(()=>selectProject('${p.id}'),40)">${p.code?'<span class="code">'+esc(p.code)+'</span> ':''}${esc(p.name)}</span></b>${p.client?'<div class="muted" style="font-size:11.5px">'+esc(p.client)+'</div>':''}</td>
    <td class="l fcell" onclick="finEdit(this,'${p.id}','status')"><span class="pill"><i class="dot s-${p.status}"></i>${esc(p.status||'—')}</span></td>
    <td class="l fcell" onclick="finEdit(this,'${p.id}','leader_id')">${esc(p.leader_id?OC.personName(p.leader_id):'—')}</td>
    <td class="fcell" onclick="finEdit(this,'${p.id}','amount')">${OC.yen(p.revenue)}</td>
    <td>${OC.yen(p.cost)}</td><td>${OC.yen(p.outsource)}</td>
    <td class="${(p.profit||0)<0?'neg':''}"><b>${OC.yen(p.profit)}</b></td><td>${p.profit_rate}%</td>
    <td class="l fcell" onclick="finEdit(this,'${p.id}','delivery_date')">${OC.fmtDate(p.delivery_date)}</td>
  </tr>`).join('')||'<tr><td class="empty" colspan="9">該当する案件がありません</td></tr>'}</tbody></table>`;
}

function finEdit(td,pid,field){
  if(td.querySelector('select,input'))return;
  const p=OC.projects.find(x=>x.id===pid);if(!p)return;
  let ctrl;
  if(field==='status')ctrl=`<select class="einput" onchange="saveProjField('${pid}','status',this.value)" onblur="paintFinance()">${pstatusOptions(p.status)}</select>`;
  else if(field==='leader_id')ctrl=`<select class="einput" onchange="saveProjField('${pid}','leader_id',this.value)" onblur="paintFinance()">${leaderOptions(p.leader_id)}</select>`;
  else if(field==='amount')ctrl=`<input class="einput" type="number" style="text-align:right" value="${p.revenue||0}" onblur="saveProjField('${pid}','amount',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
  else ctrl=`<input class="einput" type="date" value="${p.delivery_date||''}" onblur="saveProjField('${pid}','delivery_date',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
  td.innerHTML=ctrl;const el=td.querySelector('select,input');if(el)el.focus();
}
// ---- タスク（タイムライン / ボード / リスト） ----
const TSTATUS=['未着手','進行','完了','保留'];
function stColor(s){return ({'未着手':'#9AA0A6','進行':'var(--accent)','完了':'var(--good)','保留':'var(--warn)'})[s||'未着手']||'#9AA0A6';}
const TF_KEY='oc_task_filter';
function loadTaskFilter(){let f={proj:'',status:[],asgs:[]};try{const r=JSON.parse(localStorage.getItem(TF_KEY)||'null');if(r){f.proj=r.proj||'';f.status=Array.isArray(r.status)?r.status:(r.status?[r.status]:[]);f.asgs=Array.isArray(r.asgs)?r.asgs:(r.asg?[r.asg]:[]);}}catch(e){}return f;}
function saveTaskFilter(){try{localStorage.setItem(TF_KEY,JSON.stringify(taskFilter));}catch(e){}}
let taskView='list', tasksCache=[], taskFilter=loadTaskFilter();
function gv(id){const e=document.getElementById(id);return e?e.value:'';}
function visibleTasks(){return tasksCache.filter(t=>{
  if(taskFilter.proj&&t.project_id!==taskFilter.proj)return false;
  if(taskFilter.status.length&&!taskFilter.status.includes(t.status||'未着手'))return false;
  if(taskFilter.asgs.length&&!(t.task_assignees||[]).some(a=>taskFilter.asgs.includes(a.user_id)))return false;
  return true;});}
function setProjFilter(){taskFilter.proj=gv('tfProj');saveTaskFilter();paintTasks();}
// 複数チェックのフィルタ・ドロップダウン（担当・状態）
function mcheck(id,base,items,selected){
  const sel=new Set(selected||[]);const n=sel.size;
  const summary=!n?base+'：すべて':(n===1?base+'：'+(items.find(i=>sel.has(i.v))||{}).label:base+'：'+n+'件');
  const rows=items.map(i=>`<label class="${i.me?'me':''}"><input type="checkbox" value="${esc(i.v)}" ${sel.has(i.v)?'checked':''} onchange="onFilterCheck('${id}','${base}')">${esc(i.label)}</label>${i.sep?'<div class="sep"></div>':''}`).join('');
  return `<div class="mfilt" id="mf_${id}"><button type="button" class="mbtn" onclick="toggleMfilt('${id}')"><span id="mfsum_${id}">${esc(summary)}</span><span class="car">▾</span></button><div class="mpop">${rows}</div></div>`;
}
function toggleMfilt(id){const el=document.getElementById('mf_'+id);if(!el)return;const willOpen=!el.classList.contains('open');document.querySelectorAll('.mfilt.open').forEach(x=>x.classList.remove('open'));if(willOpen)el.classList.add('open');}
function onFilterCheck(id,base){
  const el=document.getElementById('mf_'+id);if(!el)return;
  const checked=[...el.querySelectorAll('.mpop input:checked')];
  const vals=checked.map(c=>c.value);
  if(id==='asg')taskFilter.asgs=vals;else taskFilter.status=vals;
  saveTaskFilter();
  const sum=document.getElementById('mfsum_'+id);
  if(sum)sum.textContent=!vals.length?base+'：すべて':(vals.length===1?base+'：'+checked[0].parentNode.textContent.trim():base+'：'+vals.length+'件');
  paintTasks();
}
function clearTaskFilter(){taskFilter={proj:'',status:[],asgs:[]};saveTaskFilter();renderTasks(document.getElementById('content'));}
document.addEventListener('click',e=>{if(!e.target.closest('.mfilt'))document.querySelectorAll('.mfilt.open').forEach(x=>x.classList.remove('open'));});

// --- タイムライン（ガント） ---
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pD(s){return new Date(s+'T00:00:00');}
// 日付バリデーション（年のタイポでタイムライン全滅を防ぐ／開始>終了の逆転を防ぐ）
function saneDate(v){ if(!v)return true; const y=+String(v).slice(0,4); return y>=2000&&y<=2100; }
function badRange(s,e){ return !!(s&&e&&s>e); }  // ISO文字列比較で 開始>終了 を検出
function dDiff(a,b){return Math.round((pD(b)-pD(a))/86400000);}
function mmdd(s){const d=pD(s);return (d.getMonth()+1)+'/'+d.getDate();}
function paintTaskTimeline(body){
  const pmap=Object.fromEntries((OC.projects||[]).map(p=>[p.id,p]));
  const groups=taskGroups();
  const dated=visibleTasks().filter(t=>t.start_date||t.end_date);
  const hasProjDate=groups.some(g=>{const p=pmap[(g.items[0]||{}).project_id];return p&&(p.delivery_date||p.start_date);});
  if(!dated.length&&!hasProjDate){body.innerHTML='<div class="card"><div class="card-b empty">日付の入ったタスク・案件期限がありません（リスト/ボードで日付を入れると表示されます）</div></div>';return;}
  // 範囲＝タスク日付＋案件(開始/納品)＋今日。未来側に余白を持たせ「先の日付まで」見えるようにする。
  const today=ymd(new Date());
  let min=today,max=today;
  const push=d=>{if(!d)return;if(d<min)min=d;if(d>max)max=d;};
  dated.forEach(t=>{push(t.start_date);push(t.end_date);});
  groups.forEach(g=>{const p=pmap[(g.items[0]||{}).project_id];if(p){push(p.start_date);push(p.delivery_date);}});
  const minD=ymd((d=>{d.setDate(d.getDate()-7);return d;})(pD(min)));
  const t45=ymd((d=>{d.setDate(d.getDate()+45);return d;})(pD(today)));         // 今日から最低45日先まで
  let maxBase=max>t45?max:t45;
  let maxD=ymd((d=>{d.setDate(d.getDate()+3);return d;})(pD(maxBase)));
  if(dDiff(minD,maxD)>560)minD=ymd((d=>{d.setDate(d.getDate()-560);return d;})(pD(maxD))); // 幅の暴走防止：過去の外れ値ではなく今日・未来側を残す（外れ値は左端でクリップ）
  const n=dDiff(minD,maxD)+1, W=30, totalW=n*W;
  const days=[];for(let i=0;i<n;i++){const d=pD(minD);d.setDate(d.getDate()+i);days.push(d);}
  const todayLeft=(today>=minD&&today<=maxD)?dDiff(minD,today)*W:-1;
  const todayBar=todayLeft>=0?`<div class="gtoday" style="left:${todayLeft+W/2}px"></div>`:'';
  const head=`<div class="grow ghead"><div class="gname">案件 / タスク</div><div class="gcells" style="width:${totalW}px;display:flex">${days.map(d=>{
    const wd=d.getDay();const ds=ymd(d);return `<div class="gday ${wd===0||wd===6?'we':''} ${ds===today?'td':''}">${d.getMonth()+1}/${d.getDate()}<br>${'日月火水木金土'[wd]}</div>`;}).join('')}</div></div>`;
  const bar=t=>{if(!t.start_date||!t.end_date)return '';const left=dDiff(minD,t.start_date)*W;const w=(dDiff(t.start_date,t.end_date)+1)*W;
    const who=(t.task_assignees||[]).map(a=>esc(OC.personName(a.user_id))).join('・');
    return `<div class="gbar s-${t.status||'未着手'}" style="left:${left}px;width:${Math.max(w-3,10)}px" onclick="openTaskModal('${t.id}')" title="${esc(t.title)}（${esc(t.status||'未着手')}${who?'・'+who:''}）"><span style="position:relative;z-index:1">${esc(t.title)}</span></div>`;};
  const rows=groups.map(g=>{
    const tops=g.items.filter(t=>!t.parent_task_id);
    const subs=t=>g.items.filter(s=>s.parent_task_id===t.id);
    const pid=(g.items[0]||{}).project_id;
    const proj=pmap[pid]||g.proj||{};
    const projName=`${g.proj?.code?'['+esc(g.proj.code)+'] ':''}${esc(g.proj?.name||'案件なし')}`;
    let projMarks=todayBar;
    if(proj.start_date&&proj.delivery_date&&proj.delivery_date>=minD&&proj.start_date<=maxD){
      const s=proj.start_date<minD?minD:proj.start_date;const e=proj.delivery_date>maxD?maxD:proj.delivery_date;
      projMarks+=`<div class="gpspan" style="left:${dDiff(minD,s)*W}px;width:${Math.max((dDiff(s,e)+1)*W-2,4)}px" title="案件期間 ${esc(proj.start_date)}〜${esc(proj.delivery_date)}"></div>`;
    }
    if(proj.delivery_date&&proj.delivery_date>=minD&&proj.delivery_date<=maxD){
      projMarks+=`<div class="gdead" style="left:${dDiff(minD,proj.delivery_date)*W+W/2}px" title="納品期限 ${esc(proj.delivery_date)}">◆</div>`;
    }
    const deadMeta=proj.delivery_date?`<span class="gnmeta" title="納品期限 ${esc(proj.delivery_date)}">◆納品 ${mmdd(proj.delivery_date)}</span>`:'';
    const projRow=`<div class="grow gproj"><div class="gname"><span class="gnttl">${pid?`<span class="tasklink" onclick="go('projects');setTimeout(()=>selectProject('${pid}'),40)">${projName}</span>`:projName}</span>${deadMeta}${pid?`<button class="gaddbtn" title="タスクを追加" onclick="openTaskAddModal('${pid}')">＋</button>`:''}</div><div class="gcells" style="width:${totalW}px">${projMarks}</div></div>`;
    const taskRow=(t,sub)=>{const who=(t.task_assignees||[]).map(a=>esc(OC.personName(a.user_id))).join('・');
      return `<div class="grow"><div class="gname" style="${sub?'padding-left:20px':''}"><i class="dot s-${t.status||'未着手'}" style="margin-right:6px"></i><span class="gnttl"><span class="tasklink" onclick="openTaskModal('${t.id}')">${sub?'↳ ':''}${esc(t.title)}</span></span>${who?'<span class="gnasg">'+who+'</span>':''}</div><div class="gcells" style="width:${totalW}px">${todayBar}${bar(t)}</div></div>`;};
    return projRow+tops.map(t=>taskRow(t,false)+subs(t).map(s=>taskRow(s,true)).join('')).join('');
  }).join('');
  body.innerHTML=`<div class="vlegend">
      <span><i style="background:#9AA0A6"></i>未着手</span><span><i style="background:var(--accent)"></i>進行</span>
      <span><i style="background:var(--good)"></i>完了</span><span><i style="background:var(--warn)"></i>保留</span>
      <span style="color:var(--bad)">┃今日</span><span style="color:var(--bad)">◆案件の納品期限</span><span>未来45日先まで表示。バーをクリックで詳細。</span></div>
    <div class="gwrap"><div class="grid-g">${head}${rows}</div></div>`;
}

    <div class="field hidden" id="oDeptF"><label class="fl">内注先（部門）</label><select id="oDept" class="input" onchange="orderUsers()">${deptOpts}</select>
      <label class="fl" style="margin-top:10px">担当者（その部門の人・任意）</label><select id="oUser" class="input"></select></div>
    <div class="field"><label class="fl">依頼内容</label><input id="oTitle" class="input" placeholder="例）図面作成・運搬 など"></div>
    <div class="field"><label class="fl">金額（円）</label><input id="oAmt" class="input" inputmode="numeric" placeholder="0"></div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="oSave" onclick="saveOrder()">発注する</button></div></div>`);
  orderKind();
}
function orderKind(){const k=document.getElementById('oKind').value;
  document.getElementById('oVendorF').classList.toggle('hidden',k!=='外注');
  document.getElementById('oDeptF').classList.toggle('hidden',k!=='内注');
  if(k==='内注')orderUsers();}
function orderUsers(){const dept=document.getElementById('oDept').value;
  const list=OC.people.filter(p=>(OC.peopleDepts[p.id]||[]).includes(dept));
  document.getElementById('oUser').innerHTML='<option value="">部門全体へ（担当者未指定）</option>'+list.map(p=>`<option value="${p.id}">${esc(p.name||p.email)}</option>`).join('');}
async function saveOrder(){
  const project_id=document.getElementById('oProj').value;
  const kind=document.getElementById('oKind').value;
  const title=document.getElementById('oTitle').value.trim();
  const amount=parseInt((document.getElementById('oAmt').value||'0').replace(/[,，]/g,''),10)||0;
  const vendor_id=kind==='外注'?(document.getElementById('oVendor').value||null):null;
  const to_dept_id=kind==='内注'?(document.getElementById('oDept').value||null):null;
  const to_user_id=kind==='内注'?(document.getElementById('oUser').value||null):null;
  if(!project_id){toast('案件を選んでください');return;}
  if(!title){toast('依頼内容を入れてください');return;}
  if(amount<0){toast('金額は0以上で入力してください');return;}
  if(kind==='外注'&&!vendor_id){toast('外注先を選んでください');return;}
  if(kind==='内注'&&!to_dept_id){toast('内注先（部門）を選んでください');return;}
  document.getElementById('oSave').disabled=true;
  const {error}=await OC.addOrder({project_id,kind,vendor_id,to_dept_id,to_user_id,from_user:OC.effectiveUserId(),title,amount});
  if(error){toast('発注エラー: '+error.message);document.getElementById('oSave').disabled=false;return;}
  closeModal();toast(kind+'「'+title+'」を発注');
  if(curView==='orders')renderOrders(document.getElementById('content'));
  if(curView==='projects'&&curProject)selectProject(curProject);
}

// ---- メンバー管理（管理者のみ） ----
function genPassword(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
  const symbols='!@#$%';
  const bytes=new Uint8Array(14);
  crypto.getRandomValues(bytes);
  let s='Oc';
  bytes.forEach((b,i)=>{s+= i%5===4 ? symbols[b%symbols.length] : chars[b%chars.length];});
  return s;
}
function deptMultiOptions(selected){
  const set=new Set(selected||[]);
  return OC.departments.map(d=>`<option value="${d.id}" ${set.has(d.id)?'selected':''}>${esc(d.name)}</option>`).join('');
}
function roleOptions(selected){
  const base=['メンバー','経理','管理者'];
  // 旧分類(建築/デザイン/SE等)や手動編集由来の想定外ロールを、暗黙で「メンバー」へ降格させず現値を保持する
  const list=(!selected||base.includes(selected))?base:[selected,...base];
  return list.map(r=>`<option value="${esc(r)}" ${r===selected?'selected':''}>${esc(r)}</option>`).join('');
}
async function renderMembers(c){
  document.getElementById('topActions').innerHTML=OC.myRole==='管理者'?'<button class="btn" onclick="openMemberModal()">＋ メンバー発行</button>':'';
  if(OC.myRole!=='管理者'){
    c.innerHTML='<div class="card"><div class="card-b empty">管理者のみメンバーを発行できます。</div></div>';
    return;
  }
  const rows=[...OC.people].sort((a,b)=>(a.name||a.email||'').localeCompare(b.name||b.email||'','ja'));
  c.innerHTML=`<div class="card">
    <div class="card-h">メンバー管理 <span class="muted" style="font-weight:600">管理者だけがID/PWを発行できます</span></div>
    <div class="card-b" style="padding:0">
      <table class="tbl">
        <thead><tr><th class="l">名前</th><th class="l">メール</th><th class="l">ロール</th><th class="l">所属部署</th><th class="l">操作</th></tr></thead>
        <tbody>${rows.map(p=>{
          const depts=(OC.peopleDepts[p.id]||[]).map(OC.deptName).join('、') || '—';
          const loginBtn=p.id===OC.me.id
            ? '<span class="muted">自分</span>'
            : `<button class="btn ghost sm" onclick="startImpersonation('${p.id}')">代理操作</button>`;
          return `<tr style="cursor:default"><td class="l"><b>${esc(p.name||'未設定')}</b></td><td class="l">${esc(p.email||'')}</td><td class="l"><span class="role-tag">${esc(p.role||'—')}</span></td><td class="l">${esc(depts)}</td><td class="l"><button class="btn ghost sm" onclick="openMemberEdit('${p.id}')">編集</button> ${loginBtn}</td></tr>`;
        }).join('') || '<tr><td class="empty" colspan="5">メンバーがいません</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}
function openMemberModal(){
  const pw=genPassword();
  modal(`<div class="modal"><div class="modal-h">メンバーID/PWを発行</div><div class="modal-b">
    <div class="field"><label class="fl">名前</label><input id="mName" class="input" placeholder="例）丹羽 駿介"></div>
    <div class="field"><label class="fl">メール（ログインID）</label><input id="mEmail" class="input" type="email" autocomplete="off" placeholder="name@example.com"></div>
    <div class="field"><label class="fl">初期パスワード</label><div class="pwbox"><input id="mPass" class="input" value="${esc(pw)}"><button class="btn ghost sm" onclick="document.getElementById('mPass').value=genPassword()">再生成</button></div></div>
    <div class="field"><label class="fl">ロール</label><select id="mRole" class="input">${roleOptions('メンバー')}</select></div>
    <div class="field"><label class="fl">所属部署（最大3・Ctrl/⌘で複数選択）</label><select id="mDepts" class="input" multiple size="4">${deptMultiOptions([])}</select></div>
    <div class="muted" style="font-size:12px;line-height:1.6">発行後、このメールと初期パスワードを本人に渡してください。本人はログイン後に左下「パスワード」から変更できます。</div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="mSave" onclick="saveMember()">発行</button></div></div>`);
}
async function saveMember(){
  const name=document.getElementById('mName').value.trim();
  const email=document.getElementById('mEmail').value.trim();
  const password=document.getElementById('mPass').value;
  const role=document.getElementById('mRole').value;
  const department_ids=Array.from(document.getElementById('mDepts').selectedOptions).map(o=>o.value).filter(Boolean);
  if(!name){toast('名前を入力してください');return;}
  if(!email){toast('メールを入力してください');return;}
  if(!password||password.length<6){toast('パスワードは6文字以上にしてください');return;}
  if(department_ids.length>3){toast('所属部署は最大3つまでです');return;}
  document.getElementById('mSave').disabled=true;
  try{
    await OC.createMember({name,email,password,role,department_ids});
    await OC.loadPeople();
    closeModal();
    toast('メンバーを発行しました');
    renderMembers(document.getElementById('content'));
  }catch(e){
    toast('発行エラー: '+e.message);
    document.getElementById('mSave').disabled=false;
  }
}
function openMemberEdit(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  const isSelf=userId===OC.me.id;
  modal(`<div class="modal"><div class="modal-h">メンバーを編集</div><div class="modal-b">
    <div class="field"><label class="fl">名前</label><input id="emName" class="input" value="${esc(p.name||'')}"></div>
    <div class="field"><label class="fl">メール（ログインID）</label><input class="input" value="${esc(p.email||'')}" disabled></div>
    <div class="field"><label class="fl">ロール</label><select id="emRole" class="input">${roleOptions(p.role||'メンバー')}</select></div>
    <div class="field"><label class="fl">所属部署（最大3・Ctrl/⌘で複数選択）</label><select id="emDepts" class="input" multiple size="4">${deptMultiOptions(OC.peopleDepts[userId]||[])}</select></div>
    <div class="muted" style="font-size:12px;line-height:1.6">ロールは権限、所属部署は所属先です。建築/デザイン/SEなどは部署側で管理します。</div>
    <div style="border-top:1px solid var(--line,#e5e5e5);margin-top:16px;padding-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="resetMemberPasswordUI('${userId}')">パスワード初期化</button>
      ${isSelf?'':`<button class="btn sm" style="background:#c0392b;color:#fff;border-color:#c0392b" onclick="closeModal();openMemberDeleteConfirm('${userId}')">このメンバーを削除…</button>`}
    </div>
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="emSave" onclick="saveMemberEdit('${userId}')">保存</button></div></div>`);
}
async function resetMemberPasswordUI(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  if(!confirm(`${p.name||p.email} さんのパスワードを初期化します。\n新しいパスワードが発行され、本人の現在のパスワードは使えなくなります。\nよろしいですか？`))return;
  try{
    const r=await OC.resetMemberPassword(userId);
    modal(`<div class="modal"><div class="modal-h">パスワードを初期化しました</div><div class="modal-b">
      <div class="muted" style="margin-bottom:8px">${esc(r.name||p.name)}（${esc(r.email||p.email)}）の新しいパスワードです。<b style="color:#c0392b">この画面を閉じると二度と表示されません。</b>今すぐ本人に伝えてください。</div>
      <div class="pwbox"><input id="rpwOut" class="input" value="${esc(r.password)}" readonly onclick="this.select()"><button class="btn ghost sm" onclick="navigator.clipboard.writeText(document.getElementById('rpwOut').value);toast('コピーしました')">コピー</button></div>
      </div><div class="modal-f"><button class="btn" onclick="closeModal()">閉じる</button></div></div>`);
  }catch(e){toast('初期化エラー: '+e.message);}
}
function openMemberDeleteConfirm(userId){
  const p=OC.peopleById[userId];
  if(!p){toast('メンバーが見つかりません');return;}
  const name=p.name||p.email||'';
  modal(`<div class="modal"><div class="modal-h" style="color:#c0392b">⚠ メンバーを削除</div><div class="modal-b">
    <div style="background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;padding:12px;margin-bottom:12px;line-height:1.7">
      <b>${esc(name)}</b>（${esc(p.email||'')}）を削除しようとしています。<br>
      ・ログインは<b>即座に無効化</b>され、二度とログインできなくなります。<br>
      ・この操作は<b>取り消せません</b>。<br>
      ・過去のタスク・経費・発注などの履歴がある場合、記録保護のためメンバー一覧には「ログイン不可」の状態で残ることがあります（履歴データは消えません）。<br>
      ・本当に削除する場合のみ、下に <b>${esc(name)}</b> と正確に入力してください。
    </div>
    <input id="delConfirmInput" class="input" placeholder="${esc(name)} と入力" oninput="document.getElementById('delConfirmBtn').disabled=(this.value!==${JSON.stringify(name)})">
    </div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn" id="delConfirmBtn" style="background:#c0392b;color:#fff;border-color:#c0392b" disabled onclick="confirmDeleteMember('${userId}')">削除する</button></div></div>`);
}
async function confirmDeleteMember(userId){
  const btn=document.getElementById('delConfirmBtn');
  btn.disabled=true;
  try{
    const r=await OC.deleteMember(userId);
    await OC.loadPeople();
    closeModal();
    if(r.historyKept){
      toast(`${r.name||''} さんのログインを無効化しました（履歴があるため一覧には残ります）`);
    }else{
      toast(`${r.name||''} さんを削除しました`);
    }
    renderMembers(document.getElementById('content'));
  }catch(e){
    toast('削除エラー: '+e.message);
    btn.disabled=false;
  }
}
async function saveMemberEdit(userId){
  const name=document.getElementById('emName').value.trim();
  const role=document.getElementById('emRole').value;
  const department_ids=Array.from(document.getElementById('emDepts').selectedOptions).map(o=>o.value).filter(Boolean);
  if(!name){toast('名前を入力してください');return;}
  if(department_ids.length>3){toast('所属部署は最大3つまでです');return;}
  document.getElementById('emSave').disabled=true;
  try{
    await OC.updateMember({id:userId,name,role,department_ids});
    await OC.loadPeople();
    if(userId===OC.me.id)await OC.loadMe();
    closeModal();
    toast('メンバーを更新しました');
    renderMembers(document.getElementById('content'));
    document.getElementById('meName').textContent=OC.meName||'—';
    document.getElementById('meRole').textContent=OC.myRole||'—';
    document.getElementById('financeNav').classList.toggle('hidden',!OC.isAccounting());
    document.getElementById('membersNav').classList.toggle('hidden',OC.myRole!=='管理者');
  }catch(e){
    toast('更新エラー: '+e.message);
    document.getElementById('emSave').disabled=false;
  }
}

// ---- 起動 ----
async function boot(){
  await OC.loadMe();
  document.getElementById('meName').textContent=OC.meName||'—';
  document.getElementById('meRole').textContent=OC.myRole||'—';
  await Promise.all([OC.loadPeople(),OC.loadDepartments(),OC.loadVendors(),OC.projectOptions()]);
  await OC.loadProjects();
  refreshShell();
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  go('home');
}
(async function init(){
  applyTheme();
  if(!OC.init()){document.getElementById('login').classList.remove('hidden');
    document.getElementById('lMsg').textContent='Supabase未設定（config.js）';return;}
  const session=await OC.session();
  if(!session){
    document.getElementById('login').classList.remove('hidden');
    let booted=false; OC.onAuth(s=>{if(s&&!booted){booted=true;boot();}});
  } else boot();
})();
</script>
